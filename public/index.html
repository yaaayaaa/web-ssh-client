  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    // --- State ---
    const termSessions = new Map(); // sessionId -> { term, fitAddon, ws, el, config, floatingWindows }
    let activeSessionId = null;

    // --- Floating Window State ---
    let floatingZCounter = 25;
    let floatingIdCounter = 0;
    let focusedFloatingTarget = null; // { parentSessionId, windowId }

    // --- Connect dialog mode ---
    let connectDialogMode = 'tab'; // 'tab' | 'floating'

    // --- Font size ---
    const FONT_SIZE_MIN = 8;
    const FONT_SIZE_MAX = 24;
    const FONT_SIZE_KEY = 'ssh-font-size';

    function getStoredFontSize() {
      const v = parseInt(localStorage.getItem(FONT_SIZE_KEY), 10);
      return (v >= FONT_SIZE_MIN && v <= FONT_SIZE_MAX) ? v : 14;
    }

    let currentFontSize = getStoredFontSize();

    function updateFontSizeLabel() {
      document.getElementById('font-size-label').textContent = currentFontSize;
    }

    function applyFontSizeToAll(size) {
      currentFontSize = Math.max(FONT_SIZE_MIN, Math.min(FONT_SIZE_MAX, size));
      localStorage.setItem(FONT_SIZE_KEY, currentFontSize);
      updateFontSizeLabel();
      for (const [, session] of termSessions) {
        session.term.options.fontSize = currentFontSize;
        session.fitAddon.fit();
        if (session.ws.readyState === 1) {
          session.ws.send(JSON.stringify({
            type: 'resize',
            cols: session.term.cols,
            rows: session.term.rows,
          }));
        }
        // Apply to floating windows
        for (const [, win] of session.floatingWindows) {
          if (win.term) {
            win.term.options.fontSize = currentFontSize;
            if (win.fitAddon) win.fitAddon.fit();
            if (win.ws && win.ws.readyState === 1) {
              win.ws.send(JSON.stringify({
                type: 'resize',
                cols: win.term.cols,
                rows: win.term.rows,
              }));
            }
          }
        }
      }
    }

    // --- Button size ---
    const BTN_SIZE_MIN = 24;
    const BTN_SIZE_MAX = 48;
    const BTN_SIZE_KEY = 'ssh-btn-size';

    function getStoredBtnSize() {
      const v = parseInt(localStorage.getItem(BTN_SIZE_KEY), 10);
      return (v >= BTN_SIZE_MIN && v <= BTN_SIZE_MAX) ? v : 32;
    }

    let currentBtnSize = getStoredBtnSize();

    function updateBtnSizeLabel() {
      document.getElementById('btn-size-label').textContent = currentBtnSize;
    }

    function applyBtnSize(size) {
      currentBtnSize = Math.max(BTN_SIZE_MIN, Math.min(BTN_SIZE_MAX, size));
      localStorage.setItem(BTN_SIZE_KEY, currentBtnSize);
      updateBtnSizeLabel();
      const toolbar = document.getElementById('mobile-toolbar');
      toolbar.style.setProperty('--btn-size', currentBtnSize + 'px');
      toolbar.style.setProperty('--btn-w', Math.round(currentBtnSize * 1.375) + 'px');
    }

    // Apply saved size on load
    applyBtnSize(currentBtnSize);

    // --- Active tab persistence ---
    const ACTIVE_TAB_KEY = 'ssh-active-tab';

    function saveActiveTab() {
      let i = 0;
      for (const [id] of termSessions) {
        if (id === activeSessionId) {
          localStorage.setItem(ACTIVE_TAB_KEY, i);
          return;
        }
        i++;
      }
    }

    function loadActiveTabIndex() {
      return parseInt(localStorage.getItem(ACTIVE_TAB_KEY), 10) || 0;
    }

    // --- Floating Window State Persistence ---
    const FLOATING_STATE_KEY = 'ssh-floating-state';
    const FLOATING_SIZE_KEY = 'ssh-floating-size';

    function saveFloatingState() {
      const state = {};
      for (const [, session] of termSessions) {
        for (const [, win] of session.floatingWindows) {
          if (!win.sessionId) continue;
          state[win.sessionId] = {
            top: win.minimized ? win.savedRect?.top : win.el.style.top,
            left: win.minimized ? win.savedRect?.left : win.el.style.left,
            width: win.minimized ? win.savedRect?.width : win.el.style.width,
            height: win.minimized ? win.savedRect?.height : win.el.style.height,
            minimized: win.minimized,
          };
        }
      }
      localStorage.setItem(FLOATING_STATE_KEY, JSON.stringify(state));
    }

    function loadFloatingState() {
      try { return JSON.parse(localStorage.getItem(FLOATING_STATE_KEY)) || {}; }
      catch { return {}; }
    }

    function cleanupFloatingState() {
      const state = loadFloatingState();
      const activeIds = new Set();
      for (const [, session] of termSessions) {
        for (const [, win] of session.floatingWindows) {
          if (win.sessionId) activeIds.add(win.sessionId);
        }
      }
      for (const id of Object.keys(state)) {
        if (!activeIds.has(id)) delete state[id];
      }
      localStorage.setItem(FLOATING_STATE_KEY, JSON.stringify(state));
    }

    // --- Floating Windows ---
    function createFloatingWindow(parentSessionId, floatingSessionId, config, rect) {
      const session = termSessions.get(parentSessionId);
      if (!session) return null;

      const windowId = 'fw-' + (++floatingIdCounter);
      const windowCount = session.floatingWindows.size;
      const offsetPx = windowCount * 24;

      const el = document.createElement('div');
      el.className = 'floating-window';
      el.id = windowId;
      if (rect) {
        el.style.top = rect.top;
        el.style.left = rect.left;
        el.style.width = rect.width;
        el.style.height = rect.height;
      } else {
        el.style.top = (40 + offsetPx) + 'px';
        el.style.left = (40 + offsetPx) + 'px';
        try {
          const saved = JSON.parse(localStorage.getItem(FLOATING_SIZE_KEY));
          if (saved) {
            el.style.width = saved.width + 'px';
            el.style.height = saved.height + 'px';
          }
        } catch {}
      }

      const titleText = (config.username || '') + '@' + (config.host || '');

      el.innerHTML = `
        <div class="floating-window-titlebar">
          <span class="floating-window-title">${escapeHtml(titleText)}</span>
          <button class="floating-window-btn minimize-btn" title="Minimize">&#x2013;</button>
          <button class="floating-window-btn close-btn" title="Close">&times;</button>
        </div>
        <div class="floating-window-body">
          <div class="floating-terminal-wrapper"></div>
        </div>
        <div class="floating-window-resize"></div>
      `;

      container.appendChild(el);

      // --- Terminal setup ---
      const termWrapper = el.querySelector('.floating-terminal-wrapper');
      const term = new Terminal({
        cursorBlink: true,
        fontSize: currentFontSize,
        fontFamily: "'JetBrains Mono', monospace",
        macOptionIsMeta: true,
        theme: {
          background: '#0d1117',
          foreground: '#c9d1d9',
          cursor: '#58a6ff',
          selectionBackground: '#264f78',
        },
        allowProposedApi: true,
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(termWrapper);

      const mouseTracker = createMouseModeTracker();

      // --- WebSocket ---
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/?sessionId=${floatingSessionId}`);

      const winData = {
        el,
        minimized: false,
        zIndex: ++floatingZCounter,
        savedRect: null,
        title: titleText,
        sessionId: floatingSessionId,
        term,
        fitAddon,
        ws,
        mouseTracker,
        bodyRo: null,
        _reconnectTimer: null,
        _pingTimer: null,
      };
      el.style.zIndex = winData.zIndex;

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            mouseTracker.feed(msg.data);
            term.write(forceTextPresentation(msg.data));
          } else if (msg.type === 'closed') {
            term.write('\r\n\x1b[31m--- Session closed ---\x1b[0m\r\n');
          } else if (msg.type === 'pong') {
            clearTimeout(winData._pingTimer);
          }
        } catch {}
      };

      ws.onclose = () => {
        if (winData.ws !== ws) return;
        if (document.visibilityState === 'visible') {
          term.write('\r\n\x1b[33m--- Disconnected, reconnecting... ---\x1b[0m\r\n');
          winData._reconnectTimer = setTimeout(() => reconnectFloatingWs(parentSessionId, windowId), 1000);
        }
      };

      wrapOnData(term, ws);
      setupKeyOverrides(term, () => winData.ws);

      term.onResize(({ cols, rows }) => {
        if (winData.ws && winData.ws.readyState === 1) {
          winData.ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });

      // Touch layer & Shift+drag selection bypass
      setupTouchLayer(termWrapper, term, () => winData.ws, mouseTracker);
      setupShiftSelect(term, mouseTracker);

      // ResizeObserver on body to auto-fit terminal
      const body = el.querySelector('.floating-window-body');
      const bodyRo = new ResizeObserver(() => {
        if (el.classList.contains('visible')) fitAddon.fit();
      });
      bodyRo.observe(body);
      winData.bodyRo = bodyRo;

      if (floatingZCounter >= 89) normalizeZIndices(parentSessionId);

      session.floatingWindows.set(windowId, winData);

      // Show if this is the active session
      if (parentSessionId === activeSessionId) el.classList.add('visible');

      // Initial fit after layout
      requestAnimationFrame(() => fitAddon.fit());

      // Titlebar drag
      const titlebar = el.querySelector('.floating-window-titlebar');
      setupDrag(el, titlebar, parentSessionId, windowId);

      // Resize handle
      const resizeHandle = el.querySelector('.floating-window-resize');
      setupResize(el, resizeHandle, parentSessionId, windowId);

      // Minimize button
      el.querySelector('.minimize-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        minimizeWindow(parentSessionId, windowId);
      });

      // Close button
      el.querySelector('.close-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        destroyFloatingWindow(parentSessionId, windowId);
      });

      // Bring to front and focus terminal on pointerdown
      el.addEventListener('pointerdown', () => {
        bringWindowToFront(parentSessionId, windowId);
        winData.term.focus({ preventScroll: true });
        focusedFloatingTarget = { parentSessionId, windowId };
      });

      return windowId;
    }

    function reconnectFloatingWs(parentSessionId, windowId, silent) {
      const session = termSessions.get(parentSessionId);
      if (!session) return;
      const winData = session.floatingWindows.get(windowId);
      if (!winData) return;

      clearTimeout(winData._reconnectTimer);
      clearTimeout(winData._pingTimer);

      const old = winData.ws;
      if (old && old.readyState < WebSocket.CLOSING) {
        old.onclose = null;
        old.close();
      }

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const resumeParam = silent ? '&resume=1' : '';
      const ws = new WebSocket(`${proto}//${location.host}/?sessionId=${winData.sessionId}${resumeParam}`);

      ws.onopen = () => {
        if (!silent) {
          winData.term.write('\r\n\x1b[32m--- Reconnected ---\x1b[0m\r\n');
        }
        ws.send(JSON.stringify({ type: 'resize', cols: winData.term.cols, rows: winData.term.rows }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            if (winData.mouseTracker) winData.mouseTracker.feed(msg.data);
            winData.term.write(forceTextPresentation(msg.data));
          } else if (msg.type === 'closed') {
            winData.term.write('\r\n\x1b[31m--- Session closed ---\x1b[0m\r\n');
          } else if (msg.type === 'pong') {
            clearTimeout(winData._pingTimer);
          }
        } catch {}
      };

      ws.onclose = () => {
        if (winData.ws !== ws) return;
        if (document.visibilityState === 'hidden') return;
        winData._reconnectTimer = setTimeout(() => reconnectFloatingWs(parentSessionId, windowId), 3000);
      };

      wrapOnData(winData.term, ws);
      winData.ws = ws;
    }

    function destroyFloatingWindow(sessionId, windowId) {
      const session = termSessions.get(sessionId);
      if (!session) return;
      const win = session.floatingWindows.get(windowId);
      if (!win) return;
      clearTimeout(win._reconnectTimer);
      clearTimeout(win._pingTimer);
      if (win.bodyRo) win.bodyRo.disconnect();
      if (win.ws) { try { win.ws.onclose = null; win.ws.close(); } catch {} }
      if (win.term) win.term.dispose();
      if (win.sessionId) {
        fetch(`/api/sessions/${win.sessionId}`, { method: 'DELETE' }).catch(() => {});
        // Remove from localStorage
        try {
          const state = loadFloatingState();
          delete state[win.sessionId];
          localStorage.setItem(FLOATING_STATE_KEY, JSON.stringify(state));
        } catch {}
      }
      win.el.remove();
      session.floatingWindows.delete(windowId);
      renderMinimizedDock(sessionId);
    }

    function destroyAllFloatingWindows(sessionId) {
      const session = termSessions.get(sessionId);
      if (!session) return;
      for (const [wid] of session.floatingWindows) {
        destroyFloatingWindow(sessionId, wid);
      }
      renderMinimizedDock(sessionId);
    }

    function setupDrag(el, handle, sessionId, windowId) {
      let startX, startY, startLeft, startTop;

      function onPointerDown(e) {
        // Only drag from titlebar, not from buttons
        if (e.target.closest('.floating-window-btn')) return;
        e.preventDefault();
        handle.setPointerCapture(e.pointerId);

        const rect = el.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        startX = e.clientX;
        startY = e.clientY;
        startLeft = rect.left - containerRect.left;
        startTop = rect.top - containerRect.top;

        handle.addEventListener('pointermove', onPointerMove);
        handle.addEventListener('pointerup', onPointerUp);
        handle.addEventListener('pointercancel', onPointerUp);
      }

      function onPointerMove(e) {
        e.preventDefault();
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        const containerRect = container.getBoundingClientRect();
        const elW = el.offsetWidth;
        const elH = el.offsetHeight;
        const minVisible = 40;

        let newLeft = startLeft + dx;
        let newTop = startTop + dy;

        // Clamp: keep at least minVisible px of titlebar visible
        newLeft = Math.max(-elW + minVisible, Math.min(containerRect.width - minVisible, newLeft));
        newTop = Math.max(0, Math.min(containerRect.height - minVisible, newTop));

        el.style.left = newLeft + 'px';
        el.style.top = newTop + 'px';
      }

      function onPointerUp(e) {
        handle.releasePointerCapture(e.pointerId);
        handle.removeEventListener('pointermove', onPointerMove);
        handle.removeEventListener('pointerup', onPointerUp);
        handle.removeEventListener('pointercancel', onPointerUp);
      }

      handle.addEventListener('pointerdown', onPointerDown);
    }

    function setupResize(el, handle, sessionId, windowId) {
      let startX, startY, startW, startH;

      function onPointerDown(e) {
        e.preventDefault();
        e.stopPropagation();
        handle.setPointerCapture(e.pointerId);

        startX = e.clientX;
        startY = e.clientY;
        startW = el.offsetWidth;
        startH = el.offsetHeight;

        handle.addEventListener('pointermove', onPointerMove);
        handle.addEventListener('pointerup', onPointerUp);
        handle.addEventListener('pointercancel', onPointerUp);
      }

      function onPointerMove(e) {
        e.preventDefault();
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        const newW = Math.max(240, startW + dx);
        const newH = Math.max(160, startH + dy);

        el.style.width = newW + 'px';
        el.style.height = newH + 'px';
      }

      function onPointerUp(e) {
        handle.releasePointerCapture(e.pointerId);
        handle.removeEventListener('pointermove', onPointerMove);
        handle.removeEventListener('pointerup', onPointerUp);
        handle.removeEventListener('pointercancel', onPointerUp);
        // Save size as default for new windows
        localStorage.setItem(FLOATING_SIZE_KEY, JSON.stringify({ width: el.offsetWidth, height: el.offsetHeight }));
        // Fit terminal after resize ends
        const session = termSessions.get(sessionId);
        if (session) {
          const win = session.floatingWindows.get(windowId);
          if (win && win.fitAddon) win.fitAddon.fit();
        }
      }

      handle.addEventListener('pointerdown', onPointerDown);
    }

    function minimizeWindow(sessionId, windowId) {
      const session = termSessions.get(sessionId);
      if (!session) return;
      const win = session.floatingWindows.get(windowId);
      if (!win || win.minimized) return;

      win.savedRect = {
        left: win.el.style.left,
        top: win.el.style.top,
        width: win.el.style.width,
        height: win.el.style.height,
      };
      win.minimized = true;
      win.el.classList.remove('visible');
      renderMinimizedDock(sessionId);
    }

    function restoreWindow(sessionId, windowId) {
      const session = termSessions.get(sessionId);
      if (!session) return;
      const win = session.floatingWindows.get(windowId);
      if (!win || !win.minimized) return;

      win.minimized = false;
      if (win.savedRect) {
        win.el.style.left = win.savedRect.left;
        win.el.style.top = win.savedRect.top;
        win.el.style.width = win.savedRect.width;
        win.el.style.height = win.savedRect.height;
      }
      if (sessionId === activeSessionId) {
        win.el.classList.add('visible');
      }
      bringWindowToFront(sessionId, windowId);
      if (win.fitAddon) requestAnimationFrame(() => win.fitAddon.fit());
      renderMinimizedDock(sessionId);
    }

    function bringWindowToFront(sessionId, windowId) {
      const session = termSessions.get(sessionId);
      if (!session) return;
      const win = session.floatingWindows.get(windowId);
      if (!win) return;

      floatingZCounter++;
      if (floatingZCounter >= 89) normalizeZIndices(sessionId);
      win.zIndex = floatingZCounter;
      win.el.style.zIndex = win.zIndex;
    }

    function normalizeZIndices(sessionId) {
      const session = termSessions.get(sessionId);
      if (!session) return;

      const sorted = [...session.floatingWindows.values()]
        .filter(w => !w.minimized)
        .sort((a, b) => a.zIndex - b.zIndex);

      floatingZCounter = 25;
      for (const win of sorted) {
        win.zIndex = ++floatingZCounter;
        win.el.style.zIndex = win.zIndex;
      }
    }

    function renderMinimizedDock(sessionId) {
      const dock = document.getElementById('floating-dock');
      dock.innerHTML = '';

      if (sessionId !== activeSessionId) return;

      const session = termSessions.get(sessionId);
      if (!session) return;

      for (const [wid, win] of session.floatingWindows) {
        if (!win.minimized) continue;
        const pill = document.createElement('div');
        pill.className = 'floating-dock-pill';
        pill.textContent = win.title;
        pill.addEventListener('click', () => restoreWindow(sessionId, wid));
        dock.appendChild(pill);
      }
    }

    function updateAddWindowButton() {
      const btn = document.getElementById('btn-add-window');
      btn.style.display = termSessions.size > 0 ? 'inline-flex' : 'none';
    }

    // --- DOM refs ---
    const tabBar = document.getElementById('tab-bar');
    const sidebar = document.getElementById('sidebar');
    const sidebarTabs = document.getElementById('sidebar-tabs');
    const container = document.getElementById('terminal-container');
    const emptyState = document.getElementById('empty-state');
    const connectOverlay = document.getElementById('connect-overlay');
    const connectForm = document.getElementById('connect-form');
    const connectError = document.getElementById('connect-error');
    const btnConnect = document.getElementById('btn-connect');

    // --- Init: load existing sessions or restore from localStorage ---
    async function init() {
      // Read before attachSession loop overwrites it
      const savedIndex = loadActiveTabIndex();
      const floatingState = loadFloatingState();

      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const floatingToRestore = [];

        // 1st pass: restore tab sessions
        for (const s of sessions) {
          if (s.type === 'floating') {
            floatingToRestore.push(s);
            continue;
          }
          attachSession(s.id, s);
        }

        // 2nd pass: restore floating windows
        for (const s of floatingToRestore) {
          if (!s.parentSessionId || !termSessions.has(s.parentSessionId)) {
            // Parent session doesn't exist → delete orphaned floating session
            fetch(`/api/sessions/${s.id}`, { method: 'DELETE' }).catch(() => {});
            continue;
          }
          const saved = floatingState[s.id] || null;
          const rect = saved ? { top: saved.top, left: saved.left, width: saved.width, height: saved.height } : null;
          const windowId = createFloatingWindow(s.parentSessionId, s.id, s, rect);
          // Restore minimized state
          if (saved && saved.minimized && windowId) {
            minimizeWindow(s.parentSessionId, windowId);
          }
        }
      } catch {}

      // Restore the previously active tab
      const sessionIds = [...termSessions.keys()];
      if (sessionIds.length > 0) {
        const targetId = sessionIds[Math.min(savedIndex, sessionIds.length - 1)];
        activateSession(targetId);
      }

      // Clean up stale localStorage entries
      cleanupFloatingState();
    }

    // --- Saved Connections ---
    let savedConnections = [];

    async function loadSavedConnections() {
      try {
        const res = await fetch('/api/connections');
        savedConnections = await res.json();
      } catch { savedConnections = []; }
      renderSavedList();
    }

    function renderSavedList() {
      const list = document.getElementById('saved-list');
      const divider = document.getElementById('saved-divider');
      list.innerHTML = '';
      if (savedConnections.length === 0) {
        divider.style.display = 'none';
        return;
      }
      divider.style.display = '';
      list.innerHTML = '<div class="saved-list-header">Saved Connections</div>';
      for (const c of savedConnections) {
        const item = document.createElement('div');
        item.className = 'saved-item';
        item.innerHTML = `
          <div class="saved-item-info">
            <div class="saved-item-name">${escapeHtml(c.name)}</div>
            <div class="saved-item-detail">${escapeHtml(c.username)}@${escapeHtml(c.host)}:${c.port}</div>
          </div>
          <div class="saved-item-actions">
            <button class="del-btn" title="Delete">&times;</button>
          </div>
        `;
        item.querySelector('.saved-item-info').addEventListener('click', () => connectSaved(c.id));
        item.querySelector('.del-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteSavedConnection(c.id);
        });
        list.appendChild(item);
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    async function connectSaved(connId) {
      connectError.style.display = 'none';
      btnConnect.disabled = true;
      btnConnect.textContent = 'Connecting...';
      try {
        const cRes = await fetch(`/api/connections/${connId}`);
        if (!cRes.ok) throw new Error('Failed to load connection');
        const conn = await cRes.json();
        const body = {
          host: conn.host,
          port: conn.port,
          username: conn.username,
          password: conn.password || undefined,
          privateKey: conn.privateKey || undefined,
          type: connectDialogMode === 'floating' ? 'floating' : 'tab',
        };
        if (connectDialogMode === 'floating' && activeSessionId) {
          body.parentSessionId = activeSessionId;
        }
        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Connection failed');
        hideConnectDialog();
        if (connectDialogMode === 'floating' && activeSessionId) {
          createFloatingWindow(activeSessionId, data.sessionId, { ...conn, ...data });
        } else {
          attachSession(data.sessionId, data);
        }
      } catch (err) {
        connectError.textContent = err.message;
        connectError.style.display = 'block';
      } finally {
        btnConnect.disabled = false;
        btnConnect.textContent = 'Connect';
      }
    }

    async function deleteSavedConnection(connId) {
      try {
        await fetch(`/api/connections/${connId}`, { method: 'DELETE' });
        savedConnections = savedConnections.filter(c => c.id !== connId);
        renderSavedList();
      } catch {}
    }

    // --- Connect Dialog ---
    function showConnectDialog(mode) {
      connectDialogMode = mode || 'tab';
      document.querySelector('#connect-dialog h2').textContent =
        connectDialogMode === 'floating' ? 'New Panel Connection' : 'New Connection';
      loadSavedConnections();
      connectOverlay.classList.add('show');
      document.getElementById('f-host').focus();
    }
    function hideConnectDialog() {
      connectOverlay.classList.remove('show');
      connectError.style.display = 'none';
      connectForm.reset();
      document.getElementById('f-port').value = '22';
      document.getElementById('f-save').checked = true;
    }

    document.getElementById('btn-new').addEventListener('click', showConnectDialog);
    document.getElementById('btn-add-window').addEventListener('click', () => {
      if (activeSessionId) showConnectDialog('floating');
    });

    // Font size buttons
    updateFontSizeLabel();
    document.getElementById('btn-font-dec').addEventListener('click', () => {
      applyFontSizeToAll(currentFontSize - 1);
    });
    document.getElementById('btn-font-inc').addEventListener('click', () => {
      applyFontSizeToAll(currentFontSize + 1);
    });

    // Button size buttons
    updateBtnSizeLabel();
    document.getElementById('btn-btn-dec').addEventListener('click', () => {
      applyBtnSize(currentBtnSize - 2);
    });
    document.getElementById('btn-btn-inc').addEventListener('click', () => {
      applyBtnSize(currentBtnSize + 2);
    });

    connectForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      connectError.style.display = 'none';
      btnConnect.disabled = true;
      btnConnect.textContent = 'Connecting...';

      const body = {
        host: document.getElementById('f-host').value.trim(),
        port: parseInt(document.getElementById('f-port').value) || 22,
        username: document.getElementById('f-username').value.trim(),
        password: document.getElementById('f-password').value,
        privateKey: document.getElementById('f-key').value.trim() || undefined,
        type: connectDialogMode === 'floating' ? 'floating' : 'tab',
      };
      if (connectDialogMode === 'floating' && activeSessionId) {
        body.parentSessionId = activeSessionId;
      }

      try {
        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Connection failed');

        // Save connection if checkbox is checked
        if (document.getElementById('f-save').checked) {
          try {
            await fetch('/api/connections', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
          } catch {}
        }

        hideConnectDialog();
        if (connectDialogMode === 'floating' && activeSessionId) {
          createFloatingWindow(activeSessionId, data.sessionId, data);
        } else {
          attachSession(data.sessionId, data);
        }
      } catch (err) {
        connectError.textContent = err.message;
        connectError.style.display = 'block';
      } finally {
        btnConnect.disabled = false;
        btnConnect.textContent = 'Connect';
      }
    });

    // Close overlay on backdrop click
    connectOverlay.addEventListener('click', (e) => {
      if (e.target === connectOverlay) hideConnectDialog();
    });

    // --- Session Management ---
    function attachSession(sessionId, config) {
      // Create terminal element
      const wrapper = document.createElement('div');
      wrapper.className = 'terminal-wrapper';
      wrapper.id = `term-${sessionId}`;
      wrapper.addEventListener('pointerdown', () => {
        focusedFloatingTarget = null;
      });
      container.appendChild(wrapper);

      const term = new Terminal({
        cursorBlink: true,
        fontSize: currentFontSize,
        fontFamily: "'JetBrains Mono', monospace",
        macOptionIsMeta: true,
        theme: {
          background: '#0d1117',
          foreground: '#c9d1d9',
          cursor: '#58a6ff',
          selectionBackground: '#264f78',
        },
        allowProposedApi: true,
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(wrapper);
      fitAddon.fit();

      const mouseTracker = createMouseModeTracker();

      // WebSocket
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/?sessionId=${sessionId}`);

      ws.onopen = () => {
        // Send initial size
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            mouseTracker.feed(msg.data);
            term.write(forceTextPresentation(msg.data));
          } else if (msg.type === 'closed') {
            term.write('\r\n\x1b[31m--- Session closed ---\x1b[0m\r\n');
            removeSession(sessionId);
          } else if (msg.type === 'error') {
            term.write(`\r\n\x1b[31mError: ${msg.message}\x1b[0m\r\n`);
          } else if (msg.type === 'pong') {
            const s = termSessions.get(sessionId);
            if (s) clearTimeout(s._pingTimer);
          }
        } catch {}
      };

      ws.onclose = () => {
        const s = termSessions.get(sessionId);
        if (!s || s.ws !== ws) return;
        if (document.visibilityState === 'visible') {
          term.write('\r\n\x1b[33m--- Disconnected from server, reconnecting... ---\x1b[0m\r\n');
          s._reconnectTimer = setTimeout(() => reconnectWs(sessionId), 1000);
        }
        // If page is hidden, visibilitychange handler will reconnect on resume
      };

      wrapOnData(term, ws);

      term.onResize(({ cols, rows }) => {
        const cur = termSessions.get(sessionId);
        if (cur && cur.ws.readyState === 1) {
          cur.ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });

      // Observe wrapper visibility changes (e.g. tab switch: display:none → block)
      // so fit runs as a callback when the element actually gains dimensions.
      const wrapperRo = new ResizeObserver(() => {
        if (wrapper.classList.contains('active')) fitAddon.fit();
      });
      wrapperRo.observe(wrapper);

      termSessions.set(sessionId, { term, fitAddon, ws, el: wrapper, config, mouseTracker, wrapperRo, floatingWindows: new Map() });

      setupKeyOverrides(term, () => termSessions.get(sessionId)?.ws);
      setupTouchLayer(wrapper, term, () => termSessions.get(sessionId)?.ws, mouseTracker);
      setupShiftSelect(term, mouseTracker);
      activateSession(sessionId);
      renderTabs();
    }

    function reconnectWs(sessionId, silent) {
      const session = termSessions.get(sessionId);
      if (!session) return;

      clearTimeout(session._reconnectTimer);
      clearTimeout(session._pingTimer);

      // Close existing WebSocket if still in progress
      const old = session.ws;
      if (old && old.readyState < WebSocket.CLOSING) {
        old.onclose = null;
        old.close();
      }

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const resumeParam = silent ? '&resume=1' : '';
      const ws = new WebSocket(`${proto}//${location.host}/?sessionId=${sessionId}${resumeParam}`);

      ws.onopen = () => {
        if (!silent) {
          session.term.write('\r\n\x1b[32m--- Reconnected ---\x1b[0m\r\n');
        }
        ws.send(JSON.stringify({ type: 'resize', cols: session.term.cols, rows: session.term.rows }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            if (session.mouseTracker) session.mouseTracker.feed(msg.data);
            session.term.write(forceTextPresentation(msg.data));
          } else if (msg.type === 'closed') {
            session.term.write('\r\n\x1b[31m--- Session closed ---\x1b[0m\r\n');
            removeSession(sessionId);
          } else if (msg.type === 'pong') {
            clearTimeout(session._pingTimer);
          }
        } catch {}
      };

      ws.onclose = () => {
        if (session.ws !== ws) return;
        // Don't retry while page is hidden — saves battery on mobile.
        // visibilitychange handler will reconnect when page resumes.
        if (document.visibilityState === 'hidden') return;
        session._reconnectTimer = setTimeout(() => reconnectWs(sessionId), 3000);
      };

      wrapOnData(session.term, ws);

      session.ws = ws;
    }

    function activateSession(sessionId) {
      activeSessionId = sessionId;
      focusedFloatingTarget = null;
      for (const [id, s] of termSessions) {
        s.el.classList.toggle('active', id === sessionId);
        // Toggle floating windows visibility per session
        for (const [, win] of s.floatingWindows) {
          if (id === sessionId && !win.minimized) {
            win.el.classList.add('visible');
          } else {
            win.el.classList.remove('visible');
          }
        }
      }
      emptyState.style.display = termSessions.size > 0 ? 'none' : 'flex';
      const session = termSessions.get(sessionId);
      if (session) {
        // ResizeObserver on the wrapper will call fit() when it gains dimensions.
        // Focus the terminal after layout settles.
        requestAnimationFrame(() => session.term.focus({ preventScroll: true }));
      }
      renderTabs();
      saveActiveTab();
      renderMinimizedDock(sessionId);
      updateAddWindowButton();
    }

    function removeSession(sessionId) {
      const session = termSessions.get(sessionId);
      if (!session) return;
      destroyAllFloatingWindows(sessionId);
      try { session.ws.close(); } catch {}
      session.wrapperRo.disconnect();
      session.term.dispose();
      session.el.remove();
      termSessions.delete(sessionId);

      if (activeSessionId === sessionId) {
        const remaining = [...termSessions.keys()];
        if (remaining.length > 0) {
          activateSession(remaining[remaining.length - 1]);
        } else {
          activeSessionId = null;
          emptyState.style.display = 'flex';
        }
      }
      renderTabs();
      updateAddWindowButton();
    }

    async function closeSession(sessionId) {
      try {
        await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
      } catch {}
      removeSession(sessionId);
    }

    // --- Tabs ---
    const TAB_MIN_WIDTH = 80; // px – threshold before switching to scroll mode

    function renderTabs() {
      const isDesktop = window.innerWidth > 768;
      const target = isDesktop ? sidebarTabs : tabBar;
      const savedScrollLeft = tabBar.scrollLeft;
      // Clear both containers
      tabBar.innerHTML = '';
      sidebarTabs.innerHTML = '';
      tabBar.classList.remove('scrollable');
      let tabIdx = 0;
      for (const [id, s] of termSessions) {
        tabIdx++;
        const tab = document.createElement('div');
        tab.className = `tab${id === activeSessionId ? ' active' : ''}`;
        tab.dataset.sessionId = id;
        const label = `${s.config.username || ''}@${s.config.host || ''}`;
        const numberBadge = tabIdx <= 9 ? `<span class="tab-number">${tabIdx}</span>` : '';
        tab.innerHTML = `
          ${numberBadge}
          <span class="tab-label">${label}</span>
          <span class="close-btn" title="Close">&times;</span>
        `;
        tab.querySelector('.tab-label').addEventListener('click', () => activateSession(id));
        tab.querySelector('.close-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          closeSession(id);
        });
        target.appendChild(tab);
      }
      if (!isDesktop) {
        updateTabLayout();
        tabBar.scrollLeft = savedScrollLeft;
      }
    }

    function updateTabLayout() {
      const count = tabBar.children.length;
      if (count === 0) return;
      const gap = 4;
      const available = tabBar.clientWidth - gap * (count - 1);
      const perTab = available / count;
      tabBar.classList.toggle('scrollable', perTab < TAB_MIN_WIDTH);
    }

    // --- Header toggle ---
    {
      const HEADER_HIDDEN_KEY = 'ssh-header-hidden';
      const headerEl = document.getElementById('header');
      const toggleIcon = document.getElementById('toggle-icon');

      // Restore saved state
      if (localStorage.getItem(HEADER_HIDDEN_KEY) === 'true') {
        headerEl.classList.add('hidden');
        toggleIcon.textContent = '▼';
      }

      document.getElementById('header-toggle').addEventListener('click', () => {
        const hidden = headerEl.classList.toggle('hidden');
        toggleIcon.textContent = hidden ? '▼' : '▲';
        localStorage.setItem(HEADER_HIDDEN_KEY, hidden);
      });
    }

    // --- Resize (including mobile keyboard) ---
    function fitActiveTerminal() {
      if (!activeSessionId) return;
      const session = termSessions.get(activeSessionId);
      if (session) session.fitAddon.fit();
    }

    // ResizeObserver on terminal container: fires as a callback when the
    // container's actual dimensions change (keyboard open/close, orientation
    // change, window resize). No setTimeout — the observer itself is the
    // callback that fires after CSS layout recalculates.
    {
      const ro = new ResizeObserver(() => fitActiveTerminal());
      ro.observe(document.getElementById('terminal-container'));
    }

    window.addEventListener('resize', () => { updateTabLayout(); fitActiveTerminal(); });
    window.addEventListener('beforeunload', saveFloatingState);

    // Prevent browser from scrolling the page to reveal focused elements
    // (e.g. xterm's hidden textarea). overflow:clip on html/body handles most
    // cases, but some browsers still fire scroll — reset it immediately.
    window.addEventListener('scroll', () => {
      if (window.scrollX !== 0 || window.scrollY !== 0) window.scrollTo(0, 0);
    });

    // Use visualViewport to adjust body height for mobile keyboard.
    // The height change propagates through flex layout to terminal-container,
    // which triggers the ResizeObserver above — no manual fit calls needed.
    if (window.visualViewport) {
      const applyViewportHeight = () => {
        document.body.style.height = `${window.visualViewport.height}px`;
      };
      window.visualViewport.addEventListener('resize', applyViewportHeight);
      applyViewportHeight();
    }

    // --- Reconnect WebSocket on page resume (iOS/mobile background return) ---
    // iOS suspends WebSocket connections when the browser goes to background.
    // On return, immediately check and reconnect without showing messages.
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;

      for (const [sessionId, session] of termSessions) {
        clearTimeout(session._reconnectTimer);
        clearTimeout(session._pingTimer);

        const ws = session.ws;
        if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
          reconnectWs(sessionId, true);
        } else if (ws.readyState === WebSocket.OPEN) {
          session._pingTimer = setTimeout(() => {
            reconnectWs(sessionId, true);
          }, 3000);
          try {
            ws.send(JSON.stringify({ type: 'ping' }));
          } catch {
            clearTimeout(session._pingTimer);
            reconnectWs(sessionId, true);
          }
        }

        // Reconnect floating window WebSockets
        for (const [wid, win] of session.floatingWindows) {
          clearTimeout(win._reconnectTimer);
          clearTimeout(win._pingTimer);

          const fws = win.ws;
          if (!fws || fws.readyState === WebSocket.CLOSED || fws.readyState === WebSocket.CLOSING) {
            reconnectFloatingWs(sessionId, wid, true);
          } else if (fws.readyState === WebSocket.OPEN) {
            win._pingTimer = setTimeout(() => {
              reconnectFloatingWs(sessionId, wid, true);
            }, 3000);
            try {
              fws.send(JSON.stringify({ type: 'ping' }));
            } catch {
              clearTimeout(win._pingTimer);
              reconnectFloatingWs(sessionId, wid, true);
            }
          }
        }
      }
    });

    // --- Paste fallback ---
    // Shows a small anchor bar with a hidden input. Focusing the input
    // triggers the iOS paste suggestion ("Paste" floating button).
    // The paste event fires automatically → text is resolved → bar closes.
    function showPasteDialog() {
      return new Promise((resolve) => {
        const anchor = document.getElementById('paste-anchor');
        const input = document.getElementById('paste-anchor-input');
        const btnCancel = document.getElementById('paste-cancel');
        input.value = '';
        anchor.classList.add('show');
        // Small delay so iOS registers the input as interactive
        setTimeout(() => input.focus(), 50);

        function cleanup() {
          anchor.classList.remove('show');
          input.removeEventListener('paste', onPaste);
          btnCancel.removeEventListener('click', onCancel);
        }
        function onPaste(e) {
          const text = (e.clipboardData || window.clipboardData).getData('text');
          e.preventDefault();
          cleanup();
          resolve(text || null);
        }
        function onCancel() {
          cleanup();
          resolve(null);
        }
        input.addEventListener('paste', onPaste);
        btnCancel.addEventListener('click', onCancel);
      });
    }

    // --- Mobile toolbar ---
    // Only send via WebSocket — the server echoes back and xterm.js renders it.
    // Do NOT use term.input() here as it triggers onData → double send.
    function parseEscSeq(str) {
      return str.replace(/\\x([0-9a-fA-F]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
    }

    function resolveKeyValue(input) {
      const s = input.trim();
      const lower = s.toLowerCase();
      // Ctrl+A-Z, Ctrl+[, Ctrl+\, Ctrl+]
      const ctrlMatch = s.match(/^[Cc]trl\+(.+)$/);
      if (ctrlMatch) {
        const key = ctrlMatch[1];
        if (key.length === 1) {
          const upper = key.toUpperCase();
          const code = upper.charCodeAt(0);
          if (code >= 65 && code <= 90) return String.fromCharCode(code - 64);
          if (key === '[') return '\x1b';
          if (key === '\\') return '\x1c';
          if (key === ']') return '\x1d';
        }
        return null;
      }
      // Alt+key
      const altMatch = s.match(/^[Aa]lt\+(.+)$/);
      if (altMatch) return '\x1b' + altMatch[1];
      // F1-F12
      const fMatch = lower.match(/^f(\d{1,2})$/);
      if (fMatch) {
        const fMap = {
          1:'\x1bOP', 2:'\x1bOQ', 3:'\x1bOR', 4:'\x1bOS',
          5:'\x1b[15~', 6:'\x1b[17~', 7:'\x1b[18~', 8:'\x1b[19~',
          9:'\x1b[20~', 10:'\x1b[21~', 11:'\x1b[23~', 12:'\x1b[24~'
        };
        return fMap[parseInt(fMatch[1])] || null;
      }
      // Named keys
      const namedKeys = {
        'home':'\x1b[H', 'end':'\x1b[F',
        'insert':'\x1b[2~', 'delete':'\x1b[3~',
        'pageup':'\x1b[5~', 'pagedown':'\x1b[6~'
      };
      if (namedKeys[lower]) return namedKeys[lower];
      // Plain text with \n → newline
      return s.replace(/\\n/g, '\n');
    }

    // Ctrl toggle state
    let ctrlActive = false;
    let ctrlBtnEl = null; // set by renderToolbar

    function setCtrl(active) {
      ctrlActive = active;
      if (ctrlBtnEl) ctrlBtnEl.classList.toggle('mod-active', active);
    }

    // --- Builtin keys definition ---
    const BUILTIN_KEYS = {
      'escape':      { label: 'ESC',  handler: () => '\x1b' },
      'tab':         { label: 'TAB',  handler: () => '\t' },
      'ctrl':        { label: 'Ctrl', modifier: true },
      'arrow-up':    { label: '↑',   handler: () => parseEscSeq('\\x1b[A') },
      'arrow-down':  { label: '↓',   handler: () => parseEscSeq('\\x1b[B') },
      'arrow-left':  { label: '←',   handler: () => parseEscSeq('\\x1b[D') },
      'arrow-right': { label: '→',   handler: () => parseEscSeq('\\x1b[C') },
      'paste':       { label: '📋' },
    };

    // Grid layout: array of { id, row, col }
    const DEFAULT_GRID = [
      { id: 'escape',      row: 0, col: 0 },
      { id: 'tab',         row: 0, col: 1 },
      { id: 'ctrl',        row: 0, col: 2 },
      { id: 'arrow-up',    row: 0, col: 3 },
      { id: 'paste',       row: 0, col: 4 },
      { id: 'arrow-left',  row: 1, col: 2 },
      { id: 'arrow-down',  row: 1, col: 3 },
      { id: 'arrow-right', row: 1, col: 4 },
    ];
    const TOOLBAR_LAYOUT_KEY = 'ssh-toolbar-layout';

    function loadToolbarLayout() {
      try {
        const stored = JSON.parse(localStorage.getItem(TOOLBAR_LAYOUT_KEY));
        if (Array.isArray(stored) && stored.length > 0 && stored[0].id) return stored;
      } catch {}
      return DEFAULT_GRID.map(e => ({ ...e }));
    }

    function saveToolbarLayout(layout) {
      localStorage.setItem(TOOLBAR_LAYOUT_KEY, JSON.stringify(layout));
    }

    function getFullGrid() {
      const grid = loadToolbarLayout();
      const placedIds = new Set(grid.map(e => e.id));
      const customKeys = loadCustomKeys();
      const customIds = new Set(customKeys.map(k => k.id));
      const validIds = new Set([...Object.keys(BUILTIN_KEYS), ...customIds]);

      // Ensure all builtin keys are placed
      for (const id of Object.keys(BUILTIN_KEYS)) {
        if (!placedIds.has(id)) {
          grid.push({ id, row: 0, col: getMaxCol(grid) + 1 });
        }
      }
      // Ensure all custom keys are placed
      for (const ck of customKeys) {
        if (!placedIds.has(ck.id)) {
          grid.push({ id: ck.id, ...findEmptyCell(grid) });
        }
      }
      // Remove entries for keys that no longer exist
      return grid.filter(e => validIds.has(e.id));
    }

    function getMaxCol(grid) {
      return grid.reduce((max, e) => Math.max(max, e.col), -1);
    }

    function findEmptyCell(grid) {
      const occupied = new Set(grid.map(e => `${e.row},${e.col}`));
      const maxCol = getMaxCol(grid);
      // Try to find empty cell in existing columns first
      for (let c = 0; c <= maxCol; c++) {
        for (let r = 0; r < 2; r++) {
          if (!occupied.has(`${r},${c}`)) return { row: r, col: c };
        }
      }
      // Append new column
      return { row: 0, col: maxCol + 1 };
    }

    function getFocusedTarget() {
      if (focusedFloatingTarget) {
        const session = termSessions.get(focusedFloatingTarget.parentSessionId);
        if (session) {
          const win = session.floatingWindows.get(focusedFloatingTarget.windowId);
          if (win && win.ws) return { term: win.term, ws: win.ws };
        }
        focusedFloatingTarget = null;
      }
      if (!activeSessionId) return null;
      const session = termSessions.get(activeSessionId);
      if (!session) return null;
      return { term: session.term, ws: session.ws };
    }

    function createKeyButton(id, builtin, ck) {
      const btn = document.createElement('button');
      btn.className = 'key-btn';
      btn.tabIndex = -1;
      btn.textContent = builtin ? builtin.label : ck.label;

      if (builtin && builtin.modifier) {
        ctrlBtnEl = btn;
        if (ctrlActive) btn.classList.add('mod-active');
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          setCtrl(!ctrlActive);
          const target = getFocusedTarget();
          if (target) target.term.focus({ preventScroll: true });
        });
      } else if (id === 'paste') {
        // Paste button: call navigator.clipboard.readText() DIRECTLY in
        // the click handler — no indirection. iOS Safari invalidates user
        // activation if the call goes through an intermediate async function.
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
        btn.addEventListener('click', async () => {
          const target = getFocusedTarget();
          if (!target || target.ws.readyState !== 1) return;
          let text = null;
          if (navigator.clipboard?.readText) {
            try { text = await navigator.clipboard.readText(); } catch {}
          }
          if (!text) text = await showPasteDialog();
          if (text) target.ws.send(JSON.stringify({ type: 'input', data: text }));
          if (ctrlActive) setCtrl(false);
          target.term.focus({ preventScroll: true });
        });
      } else {
        let repeatTimer = null;
        const sendKey = () => {
          const target = getFocusedTarget();
          if (!target || target.ws.readyState !== 1) return;
          let data;
          if (builtin) {
            data = builtin.handler();
          } else if (ck.type === 'special') {
            // Backward compat: old format stored escape sequences directly
            data = parseEscSeq(ck.value);
          } else {
            data = resolveKeyValue(ck.value);
          }
          if (data) target.ws.send(JSON.stringify({ type: 'input', data }));
        };
        const stopRepeat = () => {
          if (repeatTimer != null) { clearInterval(repeatTimer); repeatTimer = null; }
        };
        btn.style.touchAction = 'none';
        btn.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
        btn.addEventListener('contextmenu', (e) => e.preventDefault());
        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          const target = getFocusedTarget();
          if (target) target.term.focus({ preventScroll: true });
          sendKey();
          stopRepeat();
          let first = true;
          repeatTimer = setInterval(() => {
            if (first) { first = false; return; }
            sendKey();
          }, 80);
          setTimeout(() => { first = false; }, 400);
        });
        btn.addEventListener('pointerup', () => {
          stopRepeat();
          if (ctrlActive) setCtrl(false);
          const target = getFocusedTarget();
          if (target) target.term.focus({ preventScroll: true });
        });
        btn.addEventListener('pointerleave', stopRepeat);
        btn.addEventListener('pointercancel', stopRepeat);
      }
      return btn;
    }

    function renderToolbar() {
      const container = document.getElementById('toolbar-keys');
      container.innerHTML = '';
      ctrlBtnEl = null;

      const grid = getFullGrid();
      const customKeys = loadCustomKeys();
      const customMap = new Map(customKeys.map(k => [k.id, k]));

      for (const entry of grid) {
        const builtin = BUILTIN_KEYS[entry.id];
        const ck = customMap.get(entry.id);
        if (!builtin && !ck) continue;

        const btn = createKeyButton(entry.id, builtin, ck);
        // CSS Grid placement (1-indexed)
        btn.style.gridRow = entry.row + 1;
        btn.style.gridColumn = entry.col + 1;
        container.appendChild(btn);
      }
    }

    // Intercept keyboard input when Ctrl toggle is active.
    // xterm.js onData fires for normal key presses — we intercept and
    // convert to Ctrl+key (byte = key charCode - 64 for A-Z, or special cases).

    // Force text presentation for characters that iOS renders as color emoji.
    // Covers: misc symbols, dingbats, transport/map, enclosed alphanumerics,
    // geometric shapes, arrows, supplemental arrows, misc technical, etc.
    const EMOJI_FORCE_TEXT_RE = /[\u203C\u2049\u2122\u2139\u2194-\u2199\u21A9\u21AA\u231A\u231B\u2328\u23CF\u23E9-\u23FA\u24C2\u25AA\u25AB\u25B6\u25C0\u25FB-\u25FE\u2600-\u27BF\u2934\u2935\u2B05-\u2B07\u2B1B\u2B1C\u2B50\u2B55\u3030\u303D\u3297\u3299](?!\uFE0E)/g;
    function forceTextPresentation(str) {
      return str.replace(EMOJI_FORCE_TEXT_RE, '$&\uFE0E');
    }

    // Filter out terminal auto-responses that xterm.js generates.
    // If echoed back by the shell they appear as garbage text.
    // Matches: DA1/DA2 (\x1b[?...c, \x1b[>...c), DSR (\x1b[...n),
    //          OSC color responses (\x1b]10;...\x1b\\ or \x1b]11;...\x07 etc.)
    const TERM_RESPONSE_RE = /\x1b\[\??[>]?[\d;]*[cn]|\x1b\][\d;]*[^\x07\x1b]*(?:\x07|\x1b\\)/g;

    // --- Custom key overrides ---
    // 1. macOptionIsMeta handles Option+key natively.
    // 2. Cmd has no terminal equivalent → map standard editing shortcuts.
    // 3. Suppress xterm legacy Ctrl+digit → control-char mappings.
    const IS_MAC = /Mac|iPhone|iPad/.test(navigator.platform);
    const CMD_BINDINGS = {
      'Backspace':  '\x15',       // Cmd+Backspace → Ctrl+U (kill to BOL)
      'Delete':     '\x0b',       // Cmd+Delete    → Ctrl+K (kill to EOL)
      'ArrowLeft':  '\x01',       // Cmd+Left      → Ctrl+A (BOL)
      'ArrowRight': '\x05',       // Cmd+Right     → Ctrl+E (EOL)
    };
    function setupKeyOverrides(term, getWs) {
      term.attachCustomKeyEventHandler((e) => {
        if (e.type !== 'keydown') return true;
        // Suppress Ctrl+3 → ESC (xterm legacy mapping)
        if (e.ctrlKey && e.key === '3') return false;
        // Cmd+key editing shortcuts (Mac only)
        if (IS_MAC && e.metaKey) {
          const seq = CMD_BINDINGS[e.key];
          if (!seq) return true;
          const ws = getWs();
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'input', data: seq }));
          }
          e.preventDefault();
          return false;
        }
        return true;
      });
    }

    function wrapOnData(term, ws) {
      // --- IME composition guard ---
      // Send composed text immediately at compositionend, then skip
      // any onData that xterm.js fires for the same text afterward.
      let isComposing = false;
      let skipComposed = null;

      const textarea = term.textarea;
      if (textarea) {
        textarea.addEventListener('compositionstart', () => {
          isComposing = true;
          skipComposed = null;
        });
        textarea.addEventListener('compositionend', (e) => {
          isComposing = false;
          const text = e.data;
          if (text && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'input', data: text }));
          }
          // Mark to skip subsequent onData fires for this composed text
          skipComposed = text || null;
        });
      }

      term.onData((data) => {
        if (ws.readyState !== 1) return;
        let toSend = data;

        // Strip terminal auto-responses
        if (toSend.includes('\x1b')) {
          toSend = toSend.replace(TERM_RESPONSE_RE, '');
          if (toSend.length === 0) return;
        }

        if (ctrlActive) {
          const ch = data.length === 1 ? data.toLowerCase() : null;
          if (ch && ch >= 'a' && ch <= 'z') {
            toSend = String.fromCharCode(ch.charCodeAt(0) - 96);
          }
          setCtrl(false);
        }

        // Skip onData fired by xterm.js after compositionend
        if (skipComposed !== null) {
          if (toSend === skipComposed) { skipComposed = null; return; }
          skipComposed = null; // different data — don't skip, send normally
        }
        if (isComposing) return; // suppress intermediate composition

        ws.send(JSON.stringify({ type: 'input', data: toSend }));
      });
    }


    // --- Shift+drag selection bypass for mouse-tracking apps (tmux etc.) ---
    // When mouse tracking is active, xterm.js forwards mouse events to the
    // remote application instead of allowing text selection.  This helper
    // intercepts mouse events during Shift+drag (capture phase) so that
    // xterm.js never sees them, and drives its selection API manually.
    // Selected text is auto-copied to the clipboard on mouseup.
    function setupShiftSelect(term, mouseTracker) {
      const el = term.element;
      if (!el) return;

      let selecting = false;
      let startCol = 0, startRow = 0;
      // Word selection mode (activated by double-click)
      let wordMode = false;
      let anchorWordStart = null; // { col, row } of the anchor word's start
      let anchorWordEnd = null;   // { col, row } of the anchor word's end
      let lastClickTime = 0;
      let lastClickCol = -1, lastClickRow = -1;
      const DBLCLICK_INTERVAL = 400; // ms

      function posFromEvent(e) {
        const screen = el.querySelector('.xterm-screen');
        if (!screen) return null;
        const rect = screen.getBoundingClientRect();
        const cellW = rect.width / term.cols;
        const cellH = rect.height / term.rows;
        const col = Math.max(0, Math.min(Math.floor((e.clientX - rect.left) / cellW), term.cols - 1));
        const row = Math.max(0, Math.min(Math.floor((e.clientY - rect.top) / cellH), term.rows - 1));
        return { col, row };
      }

      // Returns true if the character at (col, row) is a word character
      function isWordChar(col, row) {
        const absRow = row + term.buffer.active.viewportY;
        const line = term.buffer.active.getLine(absRow);
        if (!line) return false;
        const cell = line.getCell(col);
        if (!cell) return false;
        const ch = cell.getChars();
        if (!ch || ch === ' ' || ch === '\t') return false;
        return /[\w\u00C0-\u024F\u0400-\u04FF\u3000-\u9FFF\uAC00-\uD7AF]/.test(ch);
      }

      // Find word boundaries at (col, row) in viewport coordinates
      function wordBoundsAt(col, row) {
        let wStart = col, wEnd = col;
        // Expand left
        while (wStart > 0 && isWordChar(wStart - 1, row)) wStart--;
        // Expand right
        while (wEnd < term.cols - 1 && isWordChar(wEnd + 1, row)) wEnd++;
        // If clicked on a non-word char, treat as single character
        if (!isWordChar(col, row)) {
          return { startCol: col, startRow: row, endCol: col, endRow: row };
        }
        return { startCol: wStart, startRow: row, endCol: wEnd, endRow: row };
      }

      function updateSelection(e) {
        const pos = posFromEvent(e);
        if (!pos) return;

        if (wordMode) {
          // Word-by-word selection: snap current position to word boundaries
          const curWord = wordBoundsAt(pos.col, pos.row);
          // Determine if cursor is before or after the anchor word
          const cursorBefore = pos.row < anchorWordStart.row ||
            (pos.row === anchorWordStart.row && pos.col < anchorWordStart.col);
          let sCol, sRow, eCol, eRow;
          if (cursorBefore) {
            sCol = curWord.startCol;
            sRow = curWord.startRow;
            eCol = anchorWordEnd.col;
            eRow = anchorWordEnd.row;
          } else {
            sCol = anchorWordStart.col;
            sRow = anchorWordStart.row;
            eCol = curWord.endCol;
            eRow = curWord.endRow;
          }
          const len = (eRow - sRow) * term.cols + (eCol - sCol) + 1;
          term.select(sCol, sRow + term.buffer.active.viewportY, len);
        } else {
          let sCol = startCol, sRow = startRow, eCol = pos.col, eRow = pos.row;
          if (sRow > eRow || (sRow === eRow && sCol > eCol)) {
            [sCol, sRow, eCol, eRow] = [eCol, eRow, sCol, sRow];
          }
          const len = (eRow - sRow) * term.cols + (eCol - sCol) + 1;
          term.select(sCol, sRow + term.buffer.active.viewportY, len);
        }
      }

      // Capture phase — runs before xterm.js's own listeners
      el.addEventListener('mousedown', (e) => {
        if (!e.shiftKey || !mouseTracker.active) return;
        const pos = posFromEvent(e);
        if (!pos) return;
        e.stopPropagation();
        e.preventDefault();

        const now = Date.now();
        const isDblClick = (now - lastClickTime < DBLCLICK_INTERVAL) &&
          pos.col === lastClickCol && pos.row === lastClickRow;
        lastClickTime = now;
        lastClickCol = pos.col;
        lastClickRow = pos.row;

        selecting = true;

        if (isDblClick) {
          // Enter word selection mode
          wordMode = true;
          const wb = wordBoundsAt(pos.col, pos.row);
          anchorWordStart = { col: wb.startCol, row: wb.startRow };
          anchorWordEnd = { col: wb.endCol, row: wb.endRow };
          startCol = wb.startCol;
          startRow = wb.startRow;
          // Select the initial word
          const len = (wb.endRow - wb.startRow) * term.cols + (wb.endCol - wb.startCol) + 1;
          term.select(wb.startCol, wb.startRow + term.buffer.active.viewportY, len);
        } else {
          wordMode = false;
          startCol = pos.col;
          startRow = pos.row;
          term.clearSelection();
        }
      }, true);

      document.addEventListener('mousemove', (e) => {
        if (!selecting) return;
        e.preventDefault();
        updateSelection(e);
      });

      document.addEventListener('mouseup', () => {
        if (!selecting) return;
        selecting = false;
        const text = term.getSelection();
        if (text) {
          navigator.clipboard.writeText(text).catch(() => {});
        }
      });
    }

    // --- Mouse mode tracker ---
    // Watches terminal output for DEC private mode set/reset sequences
    // to determine if the remote application has mouse tracking enabled.
    // ?1000 = X10 mouse, ?1002 = button-event, ?1003 = any-event
    // ?1006 = SGR extended mouse encoding
    function createMouseModeTracker() {
      let mouseMode = false;  // any mouse tracking active
      let sgrMode = false;    // SGR encoding active
      return {
        get active() { return mouseMode; },
        get sgr() { return sgrMode; },
        // Call with each chunk of output data from the server
        feed(data) {
          // Match \x1b[?{modes}h (set) and \x1b[?{modes}l (reset)
          const re = /\x1b\[\?([\d;]+)([hl])/g;
          let m;
          while ((m = re.exec(data)) !== null) {
            const modes = m[1].split(';');
            const enable = m[2] === 'h';
            for (const mode of modes) {
              if (mode === '1000' || mode === '1002' || mode === '1003') {
                mouseMode = enable;
              }
              if (mode === '1006') {
                sgrMode = enable;
              }
            }
          }
        },
      };
    }

    // --- Touch layer: direct touch control with inertia ---
    function setupTouchLayer(wrapper, term, getWs, mouseTracker) {
      const layer = document.createElement('div');
      layer.className = 'touch-layer';
      wrapper.appendChild(layer);

      let touchStartY = null;
      let pixelAccum = 0;
      let moved = false;
      let inertiaId = null;

      // Velocity: track last few moves with timestamps
      let lastY = 0;
      let lastT = 0;
      let velocity = 0;

      // Deceleration modeled after iOS UIScrollView:
      // v(t) = v0 * rate^(t/16ms), rate ≈ 0.992 per ms → ~0.88 per frame
      const DECEL = 0.88;
      const STOP_THRESHOLD = 0.3; // px/frame

      function lineHeight() {
        const el = wrapper.querySelector('.xterm-screen');
        if (el && term.rows > 0) return el.offsetHeight / term.rows;
        return 18;
      }

      function scrollByPixels(px) {
        pixelAccum += px;
        const lh = lineHeight();
        const lines = Math.trunc(pixelAccum / lh);
        if (lines === 0) return;
        pixelAccum -= lines * lh;

        if (mouseTracker.active) {
          const ws = getWs();
          if (!ws || ws.readyState !== 1) return;
          const col = Math.floor(term.cols / 2);
          const row = Math.floor(term.rows / 2);
          const btn = (lines > 0) ? 65 : 64;
          const abs = Math.abs(lines);
          for (let i = 0; i < abs; i++) {
            if (mouseTracker.sgr) {
              ws.send(JSON.stringify({ type: 'input', data: `\x1b[<${btn};${col};${row}M` }));
            } else {
              const lb = btn + 32;
              ws.send(JSON.stringify({ type: 'input', data: `\x1b[M${String.fromCharCode(lb)}${String.fromCharCode(col + 33)}${String.fromCharCode(row + 33)}` }));
            }
          }
        } else {
          term.scrollLines(lines);
        }
      }

      function stopInertia() {
        if (inertiaId !== null) {
          cancelAnimationFrame(inertiaId);
          inertiaId = null;
        }
      }

      function runInertia() {
        stopInertia();
        function tick() {
          velocity *= DECEL;
          if (Math.abs(velocity) < STOP_THRESHOLD) { inertiaId = null; return; }
          scrollByPixels(velocity);
          inertiaId = requestAnimationFrame(tick);
        }
        inertiaId = requestAnimationFrame(tick);
      }

      layer.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        stopInertia();
        touchStartY = e.touches[0].clientY;
        lastY = touchStartY;
        lastT = performance.now();
        velocity = 0;
        pixelAccum = 0;
        moved = false;
      });

      layer.addEventListener('touchmove', (e) => {
        if (touchStartY === null || e.touches.length !== 1) return;
        e.preventDefault();

        const now = performance.now();
        const currentY = e.touches[0].clientY;
        const delta = lastY - currentY; // positive = finger up = scroll down

        if (Math.abs(currentY - touchStartY) > 5) moved = true;

        // Exponential smoothing for velocity (px/frame)
        const dt = now - lastT;
        if (dt > 0) {
          const instantV = (delta / dt) * 16; // normalize to ~16ms frame
          velocity = 0.6 * instantV + 0.4 * velocity;
        }
        lastY = currentY;
        lastT = now;

        scrollByPixels(delta);
      }, { passive: false });

      layer.addEventListener('touchend', (e) => {
        if (!moved) {
          e.preventDefault();
          term.focus({ preventScroll: true });
        } else if (Math.abs(velocity) > STOP_THRESHOLD) {
          runInertia();
        }
        touchStartY = null;
        moved = false;
      });

      layer.addEventListener('touchcancel', () => {
        stopInertia();
        touchStartY = null;
        pixelAccum = 0;
        moved = false;
        velocity = 0;
      });

      return layer;
    }

    // --- Custom Keys ---
    const CUSTOM_KEYS_KEY = 'ssh-custom-keys';

    function generateId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
    }

    function loadCustomKeys() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOM_KEYS_KEY)) || [];
      } catch { return []; }
    }

    function saveCustomKeys(keys) {
      localStorage.setItem(CUSTOM_KEYS_KEY, JSON.stringify(keys));
    }

    // --- Grid Editor state ---
    let geSelectedId = null;

    function renderGridEditor() {
      const editor = document.getElementById('grid-editor');
      const hint = document.getElementById('grid-editor-hint');
      const btnDeselect = document.getElementById('ge-deselect');
      const btnDelete = document.getElementById('ge-delete');
      editor.innerHTML = '';

      const grid = getFullGrid();
      const customKeys = loadCustomKeys();
      const customMap = new Map(customKeys.map(k => [k.id, k]));
      const maxCol = Math.max(getMaxCol(grid) + 1, 4); // at least 1 extra column
      const occupied = new Map();
      for (const e of grid) occupied.set(`${e.row},${e.col}`, e.id);

      for (let c = 0; c <= maxCol; c++) {
        for (let r = 0; r < 2; r++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.style.gridRow = r + 1;
          cell.style.gridColumn = c + 1;

          const key = `${r},${c}`;
          const id = occupied.get(key);

          if (id) {
            const builtin = BUILTIN_KEYS[id];
            const ck = customMap.get(id);
            cell.classList.add('occupied');
            cell.textContent = builtin ? builtin.label : (ck ? ck.label : '?');
            if (id === geSelectedId) cell.classList.add('selected');

            cell.addEventListener('click', () => {
              if (geSelectedId === id) {
                geSelectedId = null;
              } else if (geSelectedId) {
                // Swap: move selected to this cell, this key to selected's old position
                const g = getFullGrid();
                const fromEntry = g.find(e => e.id === geSelectedId);
                const toEntry = g.find(e => e.id === id);
                if (fromEntry && toEntry) {
                  const tmpR = fromEntry.row, tmpC = fromEntry.col;
                  fromEntry.row = toEntry.row;
                  fromEntry.col = toEntry.col;
                  toEntry.row = tmpR;
                  toEntry.col = tmpC;
                  saveToolbarLayout(g);
                  renderToolbar();
                }
                geSelectedId = null;
              } else {
                geSelectedId = id;
              }
              renderGridEditor();
            });
          } else {
            // Empty cell
            if (geSelectedId) cell.classList.add('drop-target');
            cell.addEventListener('click', () => {
              if (!geSelectedId) return;
              const g = getFullGrid();
              const entry = g.find(e => e.id === geSelectedId);
              if (entry) {
                entry.row = r;
                entry.col = c;
                saveToolbarLayout(g);
                renderToolbar();
              }
              geSelectedId = null;
              renderGridEditor();
            });
          }
          editor.appendChild(cell);
        }
      }

      // Update action buttons
      const selectedIsCustom = geSelectedId && !BUILTIN_KEYS[geSelectedId];
      btnDeselect.disabled = !geSelectedId;
      btnDelete.disabled = !selectedIsCustom;

      if (geSelectedId) {
        const builtin = BUILTIN_KEYS[geSelectedId];
        const ck = customMap.get(geSelectedId);
        const name = builtin ? builtin.label : (ck ? ck.label : '');
        hint.textContent = `Selected: ${name}. Tap an empty cell to move, or tap another key to swap.`;
      } else {
        hint.textContent = 'Tap a key, then tap an empty cell to move it.';
      }
    }

    // Grid editor action buttons
    document.getElementById('ge-deselect').addEventListener('click', () => {
      geSelectedId = null;
      renderGridEditor();
    });

    document.getElementById('ge-delete').addEventListener('click', () => {
      if (!geSelectedId || BUILTIN_KEYS[geSelectedId]) return;
      const updated = loadCustomKeys().filter(k => k.id !== geSelectedId);
      saveCustomKeys(updated);
      const g = loadToolbarLayout().filter(e => e.id !== geSelectedId);
      saveToolbarLayout(g);
      geSelectedId = null;
      renderGridEditor();
      renderToolbar();
    });

    // Open/close custom keys dialog
    const customkeysOverlay = document.getElementById('customkeys-overlay');

    document.getElementById('btn-custom-keys').addEventListener('click', (e) => {
      e.preventDefault();
      geSelectedId = null;
      renderGridEditor();
      // Reset form
      document.getElementById('ck-label').value = '';
      document.getElementById('ck-value').value = '';
      customkeysOverlay.classList.add('show');
    });

    document.getElementById('ck-close').addEventListener('click', () => {
      customkeysOverlay.classList.remove('show');
      if (activeSessionId) {
        const session = termSessions.get(activeSessionId);
        if (session) session.term.focus({ preventScroll: true });
      }
    });

    customkeysOverlay.addEventListener('click', (e) => {
      if (e.target === customkeysOverlay) {
        customkeysOverlay.classList.remove('show');
      }
    });

    // Add custom key
    document.getElementById('ck-add').addEventListener('click', () => {
      const label = document.getElementById('ck-label').value.trim();
      if (!label) return;

      const value = document.getElementById('ck-value').value;
      if (!value) return;

      const newId = generateId();
      const keys = loadCustomKeys();
      keys.push({ id: newId, label, value });
      saveCustomKeys(keys);

      // Add to grid at first empty cell
      const grid = loadToolbarLayout();
      const pos = findEmptyCell(grid);
      grid.push({ id: newId, row: pos.row, col: pos.col });
      saveToolbarLayout(grid);

      renderGridEditor();
      renderToolbar();

      // Reset inputs
      document.getElementById('ck-label').value = '';
      document.getElementById('ck-value').value = '';
    });

    // Initial render
    renderToolbar();

    // --- Keyboard shortcut ---
    document.addEventListener('keydown', (e) => {
      // Ctrl+Shift+N: new connection
      if (e.ctrlKey && e.shiftKey && e.key === 'N') {
        e.preventDefault();
        showConnectDialog();
      }
      // Cmd+1-9 (Mac) / Alt+1-9 (other): switch tabs
      const mod = /Mac|iPhone|iPad/.test(navigator.platform) ? e.metaKey : e.altKey;
      if (mod && e.key >= '1' && e.key <= '9') {
        e.preventDefault();
        const tabs = document.querySelectorAll('#tab-bar .tab');
        const idx = parseInt(e.key) - 1;
        if (idx < tabs.length) {
          const sessionId = tabs[idx].dataset.sessionId;
          if (sessionId) activateSession(sessionId);
        }
      }
    });

    init();
  </script>
</body>
</html>
