<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Web SSH Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow: hidden; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    /* --- Header --- */
    #header {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      gap: 8px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }
    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }
    .tab .close-btn {
      font-size: 14px;
      line-height: 1;
      opacity: 0.6;
      cursor: pointer;
    }
    .tab .close-btn:hover { opacity: 1; }
    #btn-new {
      padding: 4px 10px;
      background: #238636;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #btn-new:hover { background: #2ea043; }

    /* --- Connect Dialog --- */
    #connect-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #connect-overlay.show { display: flex; }
    #connect-dialog {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }
    #connect-dialog h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #1f6feb;
    }
    .form-row {
      display: flex;
      gap: 12px;
    }
    .form-row .form-group { flex: 1; }
    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #30363d; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: #f85149;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* --- Terminal Area --- */
    #terminal-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .terminal-wrapper {
      position: absolute;
      inset: 0;
      display: none;
      padding: 4px;
    }
    .terminal-wrapper.active { display: block; }
    .terminal-wrapper .xterm { height: 100%; }
    .touch-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      touch-action: none;
    }

    /* --- Empty State --- */
    #empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #484f58;
      font-size: 14px;
      flex-direction: column;
      gap: 12px;
    }
    #empty-state button {
      padding: 8px 20px;
      background: #238636;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    /* --- Mobile toolbar --- */
    #mobile-toolbar {
      display: none;
      flex-shrink: 0;
      padding: 4px 8px;
      background: #161b22;
      border-top: 1px solid #30363d;
      gap: 4px;
      overflow-x: auto;
    }
    @media (max-width: 768px) {
      #mobile-toolbar { display: flex; }
    }
    .key-btn {
      padding: 6px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .key-btn:active { background: #30363d; }
    .key-btn.mod-active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }

    /* --- Saved Connections List --- */
    .saved-list {
      margin-bottom: 16px;
      max-height: 180px;
      overflow-y: auto;
    }
    .saved-list-header {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .saved-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color 0.15s;
      gap: 8px;
    }
    .saved-item:hover { border-color: #1f6feb; }
    .saved-item-info {
      flex: 1;
      min-width: 0;
    }
    .saved-item-name {
      font-size: 13px;
      color: #c9d1d9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .saved-item-detail {
      font-size: 11px;
      color: #484f58;
    }
    .saved-item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .saved-item-actions button {
      padding: 2px 6px;
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-size: 11px;
      cursor: pointer;
    }
    .saved-item-actions button:hover { color: #c9d1d9; border-color: #8b949e; }
    .saved-item-actions .del-btn:hover { color: #f85149; border-color: #f85149; }
    .divider {
      border: none;
      border-top: 1px solid #30363d;
      margin: 12px 0;
    }
    .save-check {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      color: #8b949e;
    }
    .save-check input { accent-color: #238636; }
  </style>
</head>
<body>
  <div id="header">
    <h1>SSH</h1>
    <div class="tab-bar" id="tab-bar"></div>
    <button id="btn-new">+ New</button>
  </div>

  <div id="terminal-container">
    <div id="empty-state">
      <div>No active sessions</div>
      <button onclick="showConnectDialog()">Connect to a server</button>
    </div>
  </div>

  <div id="mobile-toolbar">
    <button class="key-btn" data-key="Escape">ESC</button>
    <button class="key-btn" data-key="Tab">TAB</button>
    <button class="key-btn" id="btn-ctrl" data-modifier="ctrl">Ctrl</button>
    <button class="key-btn" data-seq="\x1b[A">Up</button>
    <button class="key-btn" data-seq="\x1b[B">Down</button>
    <button class="key-btn" data-seq="\x1b[D">Left</button>
    <button class="key-btn" data-seq="\x1b[C">Right</button>
  </div>

  <div id="connect-overlay">
    <div id="connect-dialog">
      <h2>New Connection</h2>
      <div class="saved-list" id="saved-list"></div>
      <hr class="divider" id="saved-divider" style="display:none">
      <form id="connect-form">
        <div class="form-row">
          <div class="form-group" style="flex:3">
            <label>Host</label>
            <input type="text" id="f-host" placeholder="192.168.1.1" required>
          </div>
          <div class="form-group" style="flex:1">
            <label>Port</label>
            <input type="number" id="f-port" value="22">
          </div>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="f-username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="f-password">
        </div>
        <div class="form-group">
          <label>Private Key (optional)</label>
          <textarea id="f-key" rows="3" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea>
        </div>
        <label class="save-check">
          <input type="checkbox" id="f-save" checked>
          Save this connection
        </label>
        <div class="error-msg" id="connect-error"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="hideConnectDialog()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-connect">Connect</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    // --- State ---
    const termSessions = new Map(); // sessionId -> { term, fitAddon, ws, el, config }
    let activeSessionId = null;

    // --- DOM refs ---
    const tabBar = document.getElementById('tab-bar');
    const container = document.getElementById('terminal-container');
    const emptyState = document.getElementById('empty-state');
    const connectOverlay = document.getElementById('connect-overlay');
    const connectForm = document.getElementById('connect-form');
    const connectError = document.getElementById('connect-error');
    const btnConnect = document.getElementById('btn-connect');

    // --- Init: load existing sessions ---
    async function init() {
      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        for (const s of sessions) {
          attachSession(s.id, s);
        }
      } catch {}
    }

    // --- Saved Connections ---
    let savedConnections = [];

    async function loadSavedConnections() {
      try {
        const res = await fetch('/api/connections');
        savedConnections = await res.json();
      } catch { savedConnections = []; }
      renderSavedList();
    }

    function renderSavedList() {
      const list = document.getElementById('saved-list');
      const divider = document.getElementById('saved-divider');
      list.innerHTML = '';
      if (savedConnections.length === 0) {
        divider.style.display = 'none';
        return;
      }
      divider.style.display = '';
      list.innerHTML = '<div class="saved-list-header">Saved Connections</div>';
      for (const c of savedConnections) {
        const item = document.createElement('div');
        item.className = 'saved-item';
        item.innerHTML = `
          <div class="saved-item-info">
            <div class="saved-item-name">${escapeHtml(c.name)}</div>
            <div class="saved-item-detail">${escapeHtml(c.username)}@${escapeHtml(c.host)}:${c.port}</div>
          </div>
          <div class="saved-item-actions">
            <button class="del-btn" title="Delete">&times;</button>
          </div>
        `;
        item.querySelector('.saved-item-info').addEventListener('click', () => connectSaved(c.id));
        item.querySelector('.del-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteSavedConnection(c.id);
        });
        list.appendChild(item);
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    async function connectSaved(connId) {
      connectError.style.display = 'none';
      btnConnect.disabled = true;
      btnConnect.textContent = 'Connecting...';
      try {
        const cRes = await fetch(`/api/connections/${connId}`);
        if (!cRes.ok) throw new Error('Failed to load connection');
        const conn = await cRes.json();
        const body = {
          host: conn.host,
          port: conn.port,
          username: conn.username,
          password: conn.password || undefined,
          privateKey: conn.privateKey || undefined,
        };
        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Connection failed');
        hideConnectDialog();
        attachSession(data.sessionId, data);
      } catch (err) {
        connectError.textContent = err.message;
        connectError.style.display = 'block';
      } finally {
        btnConnect.disabled = false;
        btnConnect.textContent = 'Connect';
      }
    }

    async function deleteSavedConnection(connId) {
      try {
        await fetch(`/api/connections/${connId}`, { method: 'DELETE' });
        savedConnections = savedConnections.filter(c => c.id !== connId);
        renderSavedList();
      } catch {}
    }

    // --- Connect Dialog ---
    function showConnectDialog() {
      loadSavedConnections();
      connectOverlay.classList.add('show');
      document.getElementById('f-host').focus();
    }
    function hideConnectDialog() {
      connectOverlay.classList.remove('show');
      connectError.style.display = 'none';
      connectForm.reset();
      document.getElementById('f-port').value = '22';
      document.getElementById('f-save').checked = true;
    }

    document.getElementById('btn-new').addEventListener('click', showConnectDialog);

    connectForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      connectError.style.display = 'none';
      btnConnect.disabled = true;
      btnConnect.textContent = 'Connecting...';

      const body = {
        host: document.getElementById('f-host').value.trim(),
        port: parseInt(document.getElementById('f-port').value) || 22,
        username: document.getElementById('f-username').value.trim(),
        password: document.getElementById('f-password').value,
        privateKey: document.getElementById('f-key').value.trim() || undefined,
      };

      try {
        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Connection failed');

        // Save connection if checkbox is checked
        if (document.getElementById('f-save').checked) {
          try {
            await fetch('/api/connections', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
          } catch {}
        }

        hideConnectDialog();
        attachSession(data.sessionId, data);
      } catch (err) {
        connectError.textContent = err.message;
        connectError.style.display = 'block';
      } finally {
        btnConnect.disabled = false;
        btnConnect.textContent = 'Connect';
      }
    });

    // Close overlay on backdrop click
    connectOverlay.addEventListener('click', (e) => {
      if (e.target === connectOverlay) hideConnectDialog();
    });

    // --- Session Management ---
    function attachSession(sessionId, config) {
      // Create terminal element
      const wrapper = document.createElement('div');
      wrapper.className = 'terminal-wrapper';
      wrapper.id = `term-${sessionId}`;
      container.appendChild(wrapper);

      const term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: "'JetBrains Mono', monospace",
        theme: {
          background: '#0d1117',
          foreground: '#c9d1d9',
          cursor: '#58a6ff',
          selectionBackground: '#264f78',
        },
        allowProposedApi: true,
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(wrapper);
      fitAddon.fit();

      const mouseTracker = createMouseModeTracker();

      // WebSocket
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/?sessionId=${sessionId}`);

      ws.onopen = () => {
        // Send initial size
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            mouseTracker.feed(msg.data);
            term.write(forceTextPresentation(msg.data));
          } else if (msg.type === 'closed') {
            term.write('\r\n\x1b[31m--- Session closed ---\x1b[0m\r\n');
            removeSession(sessionId);
          } else if (msg.type === 'error') {
            term.write(`\r\n\x1b[31mError: ${msg.message}\x1b[0m\r\n`);
          }
        } catch {}
      };

      ws.onclose = () => {
        // WebSocket disconnected but session may still be alive on server
        term.write('\r\n\x1b[33m--- Disconnected from server, reconnecting... ---\x1b[0m\r\n');
        setTimeout(() => reconnectWs(sessionId), 2000);
      };

      wrapOnData(term, ws);

      term.onResize(({ cols, rows }) => {
        if (ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });

      termSessions.set(sessionId, { term, fitAddon, ws, el: wrapper, config, mouseTracker });

      setupTouchLayer(wrapper, term, () => termSessions.get(sessionId)?.ws, mouseTracker);
      activateSession(sessionId);
      renderTabs();
    }

    function reconnectWs(sessionId) {
      const session = termSessions.get(sessionId);
      if (!session) return;

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/?sessionId=${sessionId}`);

      ws.onopen = () => {
        session.term.write('\r\n\x1b[32m--- Reconnected ---\x1b[0m\r\n');
        ws.send(JSON.stringify({ type: 'resize', cols: session.term.cols, rows: session.term.rows }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            if (session.mouseTracker) session.mouseTracker.feed(msg.data);
            session.term.write(forceTextPresentation(msg.data));
          } else if (msg.type === 'closed') {
            session.term.write('\r\n\x1b[31m--- Session closed ---\x1b[0m\r\n');
            removeSession(sessionId);
          }
        } catch {}
      };

      ws.onclose = () => {
        setTimeout(() => reconnectWs(sessionId), 3000);
      };

      wrapOnData(session.term, ws);

      session.ws = ws;
    }

    function activateSession(sessionId) {
      activeSessionId = sessionId;
      for (const [id, s] of termSessions) {
        s.el.classList.toggle('active', id === sessionId);
      }
      emptyState.style.display = termSessions.size > 0 ? 'none' : 'flex';
      const session = termSessions.get(sessionId);
      if (session) {
        requestAnimationFrame(() => {
          session.fitAddon.fit();
          session.term.focus();
        });
      }
      renderTabs();
    }

    function removeSession(sessionId) {
      const session = termSessions.get(sessionId);
      if (!session) return;
      try { session.ws.close(); } catch {}
      session.term.dispose();
      session.el.remove();
      termSessions.delete(sessionId);

      if (activeSessionId === sessionId) {
        const remaining = [...termSessions.keys()];
        if (remaining.length > 0) {
          activateSession(remaining[remaining.length - 1]);
        } else {
          activeSessionId = null;
          emptyState.style.display = 'flex';
        }
      }
      renderTabs();
    }

    async function closeSession(sessionId) {
      try {
        await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
      } catch {}
      removeSession(sessionId);
    }

    // --- Tabs ---
    function renderTabs() {
      tabBar.innerHTML = '';
      for (const [id, s] of termSessions) {
        const tab = document.createElement('div');
        tab.className = `tab${id === activeSessionId ? ' active' : ''}`;
        const label = `${s.config.username || ''}@${s.config.host || ''}`;
        tab.innerHTML = `
          <span class="tab-label">${label}</span>
          <span class="close-btn" title="Close">&times;</span>
        `;
        tab.querySelector('.tab-label').addEventListener('click', () => activateSession(id));
        tab.querySelector('.close-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          closeSession(id);
        });
        tabBar.appendChild(tab);
      }
    }

    // --- Resize (including mobile keyboard) ---
    function fitActiveTerminal() {
      if (!activeSessionId) return;
      const session = termSessions.get(activeSessionId);
      if (session) session.fitAddon.fit();
    }

    window.addEventListener('resize', fitActiveTerminal);

    // Use visualViewport to handle mobile keyboard open/close
    if (window.visualViewport) {
      let pendingFit = null;
      window.visualViewport.addEventListener('resize', () => {
        // Update body height to match visible area (excludes keyboard)
        document.body.style.height = `${window.visualViewport.height}px`;
        // Debounce fit to avoid excessive reflows during keyboard animation
        if (pendingFit) cancelAnimationFrame(pendingFit);
        pendingFit = requestAnimationFrame(() => {
          fitActiveTerminal();
          pendingFit = null;
        });
      });
      window.visualViewport.addEventListener('scroll', () => {
        // Prevent iOS from scrolling the page when keyboard opens
        window.scrollTo(0, 0);
      });
      // Set initial height
      document.body.style.height = `${window.visualViewport.height}px`;
    }

    // --- Mobile toolbar ---
    // Only send via WebSocket — the server echoes back and xterm.js renders it.
    // Do NOT use term.input() here as it triggers onData → double send.
    function parseEscSeq(str) {
      return str.replace(/\\x([0-9a-fA-F]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
    }

    // Ctrl toggle state
    let ctrlActive = false;
    const btnCtrl = document.getElementById('btn-ctrl');

    function setCtrl(active) {
      ctrlActive = active;
      btnCtrl.classList.toggle('mod-active', active);
    }

    btnCtrl.addEventListener('click', (e) => {
      e.preventDefault();
      setCtrl(!ctrlActive);
      // Re-focus terminal so next keypress goes there
      if (activeSessionId) {
        const session = termSessions.get(activeSessionId);
        if (session) session.term.focus();
      }
    });

    document.querySelectorAll('.key-btn:not([data-modifier])').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!activeSessionId) return;
        const session = termSessions.get(activeSessionId);
        if (!session || session.ws.readyState !== 1) return;
        let data;
        const seq = btn.dataset.seq;
        const key = btn.dataset.key;
        if (seq) {
          data = parseEscSeq(seq);
        } else if (key === 'Escape') {
          data = '\x1b';
        } else if (key === 'Tab') {
          data = '\t';
        }
        if (data) {
          session.ws.send(JSON.stringify({ type: 'input', data }));
        }
        // Ctrl auto-deactivates after sending a non-modifier key
        if (ctrlActive) setCtrl(false);
        session.term.focus();
      });
    });

    // Intercept keyboard input when Ctrl toggle is active.
    // xterm.js onData fires for normal key presses — we intercept and
    // convert to Ctrl+key (byte = key charCode - 64 for A-Z, or special cases).
    // Force text presentation for characters that mobile renders as emoji.
    // Insert U+FE0E (Variation Selector 15) after characters with emoji defaults.
    // Regex matches codepoints commonly rendered as color emoji on mobile.
    const EMOJI_DEFAULT_RE = /[\u203C\u2049\u2122\u2139\u2194-\u2199\u21A9-\u21AA\u231A-\u231B\u2328\u23CF\u23E9-\u23F3\u23F8-\u23FA\u24C2\u25AA-\u25AB\u25B6\u25C0\u25FB-\u25FE\u2600-\u27BF\u2934-\u2935\u2B05-\u2B07\u2B1B-\u2B1C\u2B50\u2B55\u3030\u303D\u3297\u3299](?!\uFE0E)/g;
    function forceTextPresentation(str) {
      return str.replace(EMOJI_DEFAULT_RE, '$&\uFE0E');
    }

    // Filter out terminal auto-responses that xterm.js generates.
    // If echoed back by the shell they appear as garbage text.
    // Matches: DA1/DA2 (\x1b[?...c, \x1b[>...c), DSR (\x1b[...n),
    //          OSC color responses (\x1b]10;...\x1b\\ or \x1b]11;...\x07 etc.)
    const TERM_RESPONSE_RE = /\x1b\[\??[>]?[\d;]*[cn]|\x1b\][\d;]*[^\x07\x1b]*(?:\x07|\x1b\\)/g;

    function wrapOnData(term, ws) {
      term.onData((data) => {
        if (ws.readyState !== 1) return;
        let toSend = data;

        // Strip terminal auto-responses
        if (toSend.includes('\x1b')) {
          toSend = toSend.replace(TERM_RESPONSE_RE, '');
          if (toSend.length === 0) return;
        }

        if (ctrlActive) {
          const ch = data.length === 1 ? data.toLowerCase() : null;
          if (ch && ch >= 'a' && ch <= 'z') {
            toSend = String.fromCharCode(ch.charCodeAt(0) - 96);
          }
          setCtrl(false);
        }
        ws.send(JSON.stringify({ type: 'input', data: toSend }));
      });
    }


    // --- Mouse mode tracker ---
    // Watches terminal output for DEC private mode set/reset sequences
    // to determine if the remote application has mouse tracking enabled.
    // ?1000 = X10 mouse, ?1002 = button-event, ?1003 = any-event
    // ?1006 = SGR extended mouse encoding
    function createMouseModeTracker() {
      let mouseMode = false;  // any mouse tracking active
      let sgrMode = false;    // SGR encoding active
      return {
        get active() { return mouseMode; },
        get sgr() { return sgrMode; },
        // Call with each chunk of output data from the server
        feed(data) {
          // Match \x1b[?{modes}h (set) and \x1b[?{modes}l (reset)
          const re = /\x1b\[\?([\d;]+)([hl])/g;
          let m;
          while ((m = re.exec(data)) !== null) {
            const modes = m[1].split(';');
            const enable = m[2] === 'h';
            for (const mode of modes) {
              if (mode === '1000' || mode === '1002' || mode === '1003') {
                mouseMode = enable;
              }
              if (mode === '1006') {
                sgrMode = enable;
              }
            }
          }
        },
      };
    }

    // --- Touch layer: direct touch control with inertia ---
    function setupTouchLayer(wrapper, term, getWs, mouseTracker) {
      const layer = document.createElement('div');
      layer.className = 'touch-layer';
      wrapper.appendChild(layer);

      let touchStartY = null;
      let pixelAccum = 0;
      let moved = false;
      let inertiaId = null;

      // Velocity: track last few moves with timestamps
      let lastY = 0;
      let lastT = 0;
      let velocity = 0;

      // Deceleration modeled after iOS UIScrollView:
      // v(t) = v0 * rate^(t/16ms), rate ≈ 0.992 per ms → ~0.88 per frame
      const DECEL = 0.88;
      const STOP_THRESHOLD = 0.3; // px/frame

      function lineHeight() {
        const el = wrapper.querySelector('.xterm-screen');
        if (el && term.rows > 0) return el.offsetHeight / term.rows;
        return 18;
      }

      function scrollByPixels(px) {
        pixelAccum += px;
        const lh = lineHeight();
        const lines = Math.trunc(pixelAccum / lh);
        if (lines === 0) return;
        pixelAccum -= lines * lh;

        if (mouseTracker.active) {
          const ws = getWs();
          if (!ws || ws.readyState !== 1) return;
          const col = Math.floor(term.cols / 2);
          const row = Math.floor(term.rows / 2);
          const btn = (lines > 0) ? 65 : 64;
          const abs = Math.abs(lines);
          for (let i = 0; i < abs; i++) {
            if (mouseTracker.sgr) {
              ws.send(JSON.stringify({ type: 'input', data: `\x1b[<${btn};${col};${row}M` }));
            } else {
              const lb = btn + 32;
              ws.send(JSON.stringify({ type: 'input', data: `\x1b[M${String.fromCharCode(lb)}${String.fromCharCode(col + 33)}${String.fromCharCode(row + 33)}` }));
            }
          }
        } else {
          term.scrollLines(lines);
        }
      }

      function stopInertia() {
        if (inertiaId !== null) {
          cancelAnimationFrame(inertiaId);
          inertiaId = null;
        }
      }

      function runInertia() {
        stopInertia();
        function tick() {
          velocity *= DECEL;
          if (Math.abs(velocity) < STOP_THRESHOLD) { inertiaId = null; return; }
          scrollByPixels(velocity);
          inertiaId = requestAnimationFrame(tick);
        }
        inertiaId = requestAnimationFrame(tick);
      }

      layer.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        stopInertia();
        touchStartY = e.touches[0].clientY;
        lastY = touchStartY;
        lastT = performance.now();
        velocity = 0;
        pixelAccum = 0;
        moved = false;
      });

      layer.addEventListener('touchmove', (e) => {
        if (touchStartY === null || e.touches.length !== 1) return;
        e.preventDefault();

        const now = performance.now();
        const currentY = e.touches[0].clientY;
        const delta = lastY - currentY; // positive = finger up = scroll down

        if (Math.abs(currentY - touchStartY) > 5) moved = true;

        // Exponential smoothing for velocity (px/frame)
        const dt = now - lastT;
        if (dt > 0) {
          const instantV = (delta / dt) * 16; // normalize to ~16ms frame
          velocity = 0.6 * instantV + 0.4 * velocity;
        }
        lastY = currentY;
        lastT = now;

        scrollByPixels(delta);
      }, { passive: false });

      layer.addEventListener('touchend', (e) => {
        if (!moved) {
          e.preventDefault();
          term.focus();
        } else if (Math.abs(velocity) > STOP_THRESHOLD) {
          runInertia();
        }
        touchStartY = null;
        moved = false;
      });

      layer.addEventListener('touchcancel', () => {
        stopInertia();
        touchStartY = null;
        pixelAccum = 0;
        moved = false;
        velocity = 0;
      });

      return layer;
    }

    // --- Keyboard shortcut ---
    document.addEventListener('keydown', (e) => {
      // Ctrl+Shift+N: new connection
      if (e.ctrlKey && e.shiftKey && e.key === 'N') {
        e.preventDefault();
        showConnectDialog();
      }
    });

    init();
  </script>
</body>
</html>
