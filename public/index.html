<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Web SSH Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { overflow: hidden; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
    }

    /* --- Header --- */
    #header {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      gap: 8px;
      flex-shrink: 0;
    }
    #header h1 {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }
    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab.active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }
    .tab .close-btn {
      font-size: 14px;
      line-height: 1;
      opacity: 0.6;
      cursor: pointer;
    }
    .tab .close-btn:hover { opacity: 1; }
    .font-size-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .font-size-controls button {
      padding: 6px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
    }
    .font-size-controls button:hover { background: #30363d; }
    .font-size-controls .font-size-label {
      font-size: 14px;
      color: #c9d1d9;
      min-width: 28px;
      text-align: center;
      user-select: none;
    }
    #btn-new {
      padding: 4px 10px;
      background: #238636;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #btn-new:hover { background: #2ea043; }

    /* --- Connect Dialog --- */
    #connect-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #connect-overlay.show { display: flex; }
    #connect-dialog {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }
    #connect-dialog h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #1f6feb;
    }
    .form-row {
      display: flex;
      gap: 12px;
    }
    .form-row .form-group { flex: 1; }
    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-primary { background: #238636; color: #fff; }
    .btn-primary:hover { background: #2ea043; }
    .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    .btn-secondary:hover { background: #30363d; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: #f85149;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* --- Terminal Area --- */
    #terminal-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .terminal-wrapper {
      position: absolute;
      inset: 0;
      display: none;
      padding: 4px;
    }
    .terminal-wrapper.active { display: block; }
    .terminal-wrapper .xterm {
      height: 100%;
      font-variant-emoji: text;
    }
    .terminal-wrapper .xterm-viewport {
      scrollbar-width: none;
    }
    .terminal-wrapper .xterm-viewport::-webkit-scrollbar {
      display: none;
    }
    .touch-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      touch-action: none;
      pointer-events: none;
    }
    @media (pointer: coarse) {
      .touch-layer { pointer-events: auto; }
    }

    /* --- Empty State --- */
    #empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #484f58;
      font-size: 14px;
      flex-direction: column;
      gap: 12px;
    }
    #empty-state button {
      padding: 8px 20px;
      background: #238636;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    /* --- Mobile toolbar --- */
    #mobile-toolbar {
      display: none;
      flex-shrink: 0;
      padding: 4px 8px;
      background: #161b22;
      border-top: 1px solid #30363d;
      gap: 4px;
      flex-wrap: nowrap;
      align-items: center;
    }
    @media (max-width: 768px) {
      #mobile-toolbar { display: flex; }
    }
    #toolbar-keys {
      display: grid;
      grid-template-rows: repeat(2, 36px);
      grid-auto-columns: 48px;
      gap: 4px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #toolbar-keys::-webkit-scrollbar { display: none; }
    .key-btn {
      min-width: 48px;
      height: 36px;
      padding: 6px 4px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .key-btn:active { background: #30363d; }
    .key-btn.mod-active {
      background: #1f6feb;
      border-color: #1f6feb;
      color: #fff;
    }
    .settings-btn {
      width: 36px;
      height: 36px;
      padding: 6px 0;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .settings-btn:active { background: #30363d; }

    /* --- Custom Keys Settings Dialog --- */
    #customkeys-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #customkeys-overlay.show { display: flex; }
    #customkeys-dialog {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 420px;
      max-height: 80dvh;
      overflow-y: auto;
    }
    #customkeys-dialog h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .ck-add-form { display: flex; flex-direction: column; gap: 10px; }
    .ck-add-form .form-group select {
      width: 100%;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      font-family: inherit;
    }
    .ck-add-form .form-group select:focus {
      outline: none;
      border-color: #1f6feb;
    }
    .ck-hint {
      font-size: 11px;
      color: #484f58;
      margin-top: 2px;
    }
    .ck-section-label {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .grid-editor-wrap {
      overflow-x: auto;
      margin-bottom: 12px;
      scrollbar-width: none;
    }
    .grid-editor-wrap::-webkit-scrollbar { display: none; }
    .grid-editor {
      display: grid;
      grid-template-rows: repeat(2, 40px);
      grid-auto-columns: 52px;
      gap: 4px;
      width: max-content;
    }
    .grid-cell {
      width: 52px;
      height: 40px;
      border: 1px dashed #30363d;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: #484f58;
      cursor: pointer;
      user-select: none;
    }
    .grid-cell:hover { border-color: #484f58; }
    .grid-cell.occupied {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-size: 12px;
    }
    .grid-cell.selected {
      border-color: #1f6feb;
      box-shadow: 0 0 0 1px #1f6feb;
    }
    .grid-cell.drop-target {
      border-color: #238636;
      background: rgba(35, 134, 54, 0.1);
    }
    .grid-editor-hint {
      font-size: 11px;
      color: #484f58;
      margin-bottom: 12px;
    }
    .grid-editor-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .grid-editor-actions button {
      padding: 4px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-size: 11px;
      cursor: pointer;
    }
    .grid-editor-actions button:hover { color: #c9d1d9; border-color: #8b949e; }
    .grid-editor-actions button.danger:hover { color: #f85149; border-color: #f85149; }
    .grid-editor-actions button:disabled { opacity: 0.3; cursor: default; }

    /* --- Saved Connections List --- */
    .saved-list {
      margin-bottom: 16px;
      max-height: 180px;
      overflow-y: auto;
    }
    .saved-list-header {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .saved-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: border-color 0.15s;
      gap: 8px;
    }
    .saved-item:hover { border-color: #1f6feb; }
    .saved-item-info {
      flex: 1;
      min-width: 0;
    }
    .saved-item-name {
      font-size: 13px;
      color: #c9d1d9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .saved-item-detail {
      font-size: 11px;
      color: #484f58;
    }
    .saved-item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .saved-item-actions button {
      padding: 2px 6px;
      background: none;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-size: 11px;
      cursor: pointer;
    }
    .saved-item-actions button:hover { color: #c9d1d9; border-color: #8b949e; }
    .saved-item-actions .del-btn:hover { color: #f85149; border-color: #f85149; }
    .divider {
      border: none;
      border-top: 1px solid #30363d;
      margin: 12px 0;
    }
    .save-check {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      color: #8b949e;
    }
    .save-check input { accent-color: #238636; }
  </style>
</head>
<body>
  <div id="header">
    <h1>SSH</h1>
    <div class="tab-bar" id="tab-bar"></div>
    <button id="btn-new">+ New</button>
  </div>

  <div id="terminal-container">
    <div id="empty-state">
      <div>No active sessions</div>
      <button onclick="showConnectDialog()">Connect to a server</button>
    </div>
  </div>

  <div id="mobile-toolbar">
    <div id="toolbar-keys"></div>
    <button class="settings-btn" id="btn-custom-keys" title="Custom Keys">&#x2699;&#xFE0E;</button>
  </div>

  <div id="connect-overlay">
    <div id="connect-dialog">
      <h2>New Connection</h2>
      <div class="saved-list" id="saved-list"></div>
      <hr class="divider" id="saved-divider" style="display:none">
      <form id="connect-form">
        <div class="form-row">
          <div class="form-group" style="flex:3">
            <label>Host</label>
            <input type="text" id="f-host" placeholder="192.168.1.1" required>
          </div>
          <div class="form-group" style="flex:1">
            <label>Port</label>
            <input type="number" id="f-port" value="22">
          </div>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="f-username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="f-password">
        </div>
        <div class="form-group">
          <label>Private Key (optional)</label>
          <textarea id="f-key" rows="3" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea>
        </div>
        <label class="save-check">
          <input type="checkbox" id="f-save" checked>
          Save this connection
        </label>
        <div class="error-msg" id="connect-error"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="hideConnectDialog()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-connect">Connect</button>
        </div>
      </form>
    </div>
  </div>

  <div id="customkeys-overlay">
    <div id="customkeys-dialog">
      <h2>Settings</h2>
      <div class="ck-section-label">Layout</div>
      <div class="grid-editor-wrap" id="grid-editor-wrap">
        <div class="grid-editor" id="grid-editor"></div>
      </div>
      <div class="grid-editor-hint" id="grid-editor-hint">Tap a key, then tap an empty cell to move it.</div>
      <div class="grid-editor-actions" id="grid-editor-actions">
        <button id="ge-deselect" disabled>Deselect</button>
        <button id="ge-delete" class="danger" disabled>Delete</button>
      </div>
      <hr class="divider">
      <div class="ck-section-label">Add Custom Key</div>
      <div class="ck-add-form" id="ck-add-form">
        <div class="form-group">
          <label>Label (button text)</label>
          <input type="text" id="ck-label" placeholder="e.g. ls, deploy, C-c" maxlength="20">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="ck-type">
            <option value="text">Text / Command</option>
            <option value="special">Special Key</option>
          </select>
        </div>
        <div class="form-group" id="ck-text-group">
          <label>Send string</label>
          <input type="text" id="ck-value" placeholder="e.g. ls -la\n">
          <div class="ck-hint">Use \n for Enter (newline)</div>
        </div>
        <div class="form-group" id="ck-special-group" style="display:none">
          <label>Special key</label>
          <select id="ck-special">
            <option value="\x03">Ctrl+C</option>
            <option value="\x04">Ctrl+D</option>
            <option value="\x1a">Ctrl+Z</option>
            <option value="\x0c">Ctrl+L</option>
            <option value="\x01">Ctrl+A</option>
            <option value="\x05">Ctrl+E</option>
            <option value="\x15">Ctrl+U</option>
            <option value="\x0b">Ctrl+K</option>
            <option value="\x1bOP">F1</option>
            <option value="\x1bOQ">F2</option>
            <option value="\x1bOR">F3</option>
            <option value="\x1bOS">F4</option>
            <option value="\x1b[15~">F5</option>
            <option value="\x1b[17~">F6</option>
            <option value="\x1b[18~">F7</option>
            <option value="\x1b[19~">F8</option>
            <option value="\x1b[20~">F9</option>
            <option value="\x1b[21~">F10</option>
            <option value="\x1b[23~">F11</option>
            <option value="\x1b[24~">F12</option>
          </select>
        </div>
        <div class="form-actions" style="margin-top:8px">
          <button type="button" class="btn btn-primary" id="ck-add">Add</button>
        </div>
      </div>
      <hr class="divider">
      <div class="ck-section-label">Font Size</div>
      <div class="font-size-controls">
        <button id="btn-font-dec" title="Decrease font size">A-</button>
        <span class="font-size-label" id="font-size-label">14</span>
        <button id="btn-font-inc" title="Increase font size">A+</button>
      </div>
      <hr class="divider">
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="ck-close">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    // --- State ---
    const termSessions = new Map(); // sessionId -> { term, fitAddon, ws, el, config }
    let activeSessionId = null;

    // --- Font size ---
    const FONT_SIZE_MIN = 8;
    const FONT_SIZE_MAX = 24;
    const FONT_SIZE_KEY = 'ssh-font-size';

    function getStoredFontSize() {
      const v = parseInt(localStorage.getItem(FONT_SIZE_KEY), 10);
      return (v >= FONT_SIZE_MIN && v <= FONT_SIZE_MAX) ? v : 14;
    }

    let currentFontSize = getStoredFontSize();

    function updateFontSizeLabel() {
      document.getElementById('font-size-label').textContent = currentFontSize;
    }

    function applyFontSizeToAll(size) {
      currentFontSize = Math.max(FONT_SIZE_MIN, Math.min(FONT_SIZE_MAX, size));
      localStorage.setItem(FONT_SIZE_KEY, currentFontSize);
      updateFontSizeLabel();
      for (const [, session] of termSessions) {
        session.term.options.fontSize = currentFontSize;
        session.fitAddon.fit();
        if (session.ws.readyState === 1) {
          session.ws.send(JSON.stringify({
            type: 'resize',
            cols: session.term.cols,
            rows: session.term.rows,
          }));
        }
      }
    }

    // --- Active tab persistence ---
    const ACTIVE_TAB_KEY = 'ssh-active-tab';

    function saveActiveTab() {
      let i = 0;
      for (const [id] of termSessions) {
        if (id === activeSessionId) {
          localStorage.setItem(ACTIVE_TAB_KEY, i);
          return;
        }
        i++;
      }
    }

    function loadActiveTabIndex() {
      return parseInt(localStorage.getItem(ACTIVE_TAB_KEY), 10) || 0;
    }

    // --- DOM refs ---
    const tabBar = document.getElementById('tab-bar');
    const container = document.getElementById('terminal-container');
    const emptyState = document.getElementById('empty-state');
    const connectOverlay = document.getElementById('connect-overlay');
    const connectForm = document.getElementById('connect-form');
    const connectError = document.getElementById('connect-error');
    const btnConnect = document.getElementById('btn-connect');

    // --- Init: load existing sessions or restore from localStorage ---
    async function init() {
      // Read before attachSession loop overwrites it
      const savedIndex = loadActiveTabIndex();

      try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        for (const s of sessions) {
          attachSession(s.id, s);
        }
      } catch {}

      // Restore the previously active tab
      const sessionIds = [...termSessions.keys()];
      if (sessionIds.length > 0) {
        const targetId = sessionIds[Math.min(savedIndex, sessionIds.length - 1)];
        activateSession(targetId);
      }
    }

    // --- Saved Connections ---
    let savedConnections = [];

    async function loadSavedConnections() {
      try {
        const res = await fetch('/api/connections');
        savedConnections = await res.json();
      } catch { savedConnections = []; }
      renderSavedList();
    }

    function renderSavedList() {
      const list = document.getElementById('saved-list');
      const divider = document.getElementById('saved-divider');
      list.innerHTML = '';
      if (savedConnections.length === 0) {
        divider.style.display = 'none';
        return;
      }
      divider.style.display = '';
      list.innerHTML = '<div class="saved-list-header">Saved Connections</div>';
      for (const c of savedConnections) {
        const item = document.createElement('div');
        item.className = 'saved-item';
        item.innerHTML = `
          <div class="saved-item-info">
            <div class="saved-item-name">${escapeHtml(c.name)}</div>
            <div class="saved-item-detail">${escapeHtml(c.username)}@${escapeHtml(c.host)}:${c.port}</div>
          </div>
          <div class="saved-item-actions">
            <button class="del-btn" title="Delete">&times;</button>
          </div>
        `;
        item.querySelector('.saved-item-info').addEventListener('click', () => connectSaved(c.id));
        item.querySelector('.del-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteSavedConnection(c.id);
        });
        list.appendChild(item);
      }
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    async function connectSaved(connId) {
      connectError.style.display = 'none';
      btnConnect.disabled = true;
      btnConnect.textContent = 'Connecting...';
      try {
        const cRes = await fetch(`/api/connections/${connId}`);
        if (!cRes.ok) throw new Error('Failed to load connection');
        const conn = await cRes.json();
        const body = {
          host: conn.host,
          port: conn.port,
          username: conn.username,
          password: conn.password || undefined,
          privateKey: conn.privateKey || undefined,
        };
        const res = await fetch('/api/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Connection failed');
        hideConnectDialog();
        attachSession(data.sessionId, data);
      } catch (err) {
        connectError.textContent = err.message;
        connectError.style.display = 'block';
      } finally {
        btnConnect.disabled = false;
        btnConnect.textContent = 'Connect';
      }
    }

    async function deleteSavedConnection(connId) {
      try {
        await fetch(`/api/connections/${connId}`, { method: 'DELETE' });
        savedConnections = savedConnections.filter(c => c.id !== connId);
        renderSavedList();
      } catch {}
    }

    // --- Connect Dialog ---
    function showConnectDialog() {
      loadSavedConnections();
      connectOverlay.classList.add('show');
      document.getElementById('f-host').focus();
    }
    function hideConnectDialog() {
      connectOverlay.classList.remove('show');
      connectError.style.display = 'none';
      connectForm.reset();
      document.getElementById('f-port').value = '22';
      document.getElementById('f-save').checked = true;
    }

    document.getElementById('btn-new').addEventListener('click', showConnectDialog);

    // Font size buttons
    updateFontSizeLabel();
    document.getElementById('btn-font-dec').addEventListener('click', () => {
      applyFontSizeToAll(currentFontSize - 1);
    });
    document.getElementById('btn-font-inc').addEventListener('click', () => {
      applyFontSizeToAll(currentFontSize + 1);
    });

    connectForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      connectError.style.display = 'none';
      btnConnect.disabled = true;
      btnConnect.textContent = 'Connecting...';

      const body = {
        host: document.getElementById('f-host').value.trim(),
        port: parseInt(document.getElementById('f-port').value) || 22,
        username: document.getElementById('f-username').value.trim(),
        password: document.getElementById('f-password').value,
        privateKey: document.getElementById('f-key').value.trim() || undefined,
      };

      try {
        const res = await fetch('/api/sessions', {

        });

        if (!res.ok) throw new Error(data.error || 'Connection failed');

        // Save connection if checkbox is checked
        if (document.getElementById('f-save').checked) {
          try {
            await fetch('/api/connections', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });
          } catch {}
        }

        hideConnectDialog();
        attachSession(data.sessionId, data);
      } catch (err) {
        connectError.textContent = err.message;
        connectError.style.display = 'block';
      } finally {
        btnConnect.disabled = false;
        btnConnect.textContent = 'Connect';
      }
    });

    // Close overlay on backdrop click
    connectOverlay.addEventListener('click', (e) => {
      if (e.target === connectOverlay) hideConnectDialog();
    });

    // --- Session Management ---
    function attachSession(sessionId, config) {
      // Create terminal element
      const wrapper = document.createElement('div');
      wrapper.className = 'terminal-wrapper';
      wrapper.id = `term-${sessionId}`;
      container.appendChild(wrapper);

      const term = new Terminal({
        cursorBlink: true,
        fontSize: currentFontSize,
        fontFamily: "'JetBrains Mono', monospace",
        theme: {
          background: '#0d1117',
          foreground: '#c9d1d9',
          cursor: '#58a6ff',
          selectionBackground: '#264f78',
        },
        allowProposedApi: true,
      });
      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(wrapper);
      fitAddon.fit();

      const mouseTracker = createMouseModeTracker();

      // WebSocket
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/?sessionId=${sessionId}`);

      ws.onopen = () => {
        // Send initial size
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            mouseTracker.feed(msg.data);
            term.write(forceTextPresentation(msg.data));
          } else if (msg.type === 'closed') {
            term.write('\r\n\x1b[31m--- Session closed ---\x1b[0m\r\n');
            removeSession(sessionId);
          } else if (msg.type === 'error') {
            term.write(`\r\n\x1b[31mError: ${msg.message}\x1b[0m\r\n`);
          }
        } catch {}
      };

      ws.onclose = () => {
        // WebSocket disconnected but session may still be alive on server
        term.write('\r\n\x1b[33m--- Disconnected from server, reconnecting... ---\x1b[0m\r\n');
        setTimeout(() => reconnectWs(sessionId), 2000);
      };

      wrapOnData(term, ws);

      term.onResize(({ cols, rows }) => {
        if (ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });

      // Observe wrapper visibility changes (e.g. tab switch: display:none → block)
      // so fit runs as a callback when the element actually gains dimensions.
      const wrapperRo = new ResizeObserver(() => {
        if (wrapper.classList.contains('active')) fitAddon.fit();
      });
      wrapperRo.observe(wrapper);

      termSessions.set(sessionId, { term, fitAddon, ws, el: wrapper, config, mouseTracker, wrapperRo });

      setupTouchLayer(wrapper, term, () => termSessions.get(sessionId)?.ws, mouseTracker);
      activateSession(sessionId);
      renderTabs();
    }

    function reconnectWs(sessionId) {
      const session = termSessions.get(sessionId);
      if (!session) return;

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/?sessionId=${sessionId}`);

      ws.onopen = () => {
        session.term.write('\r\n\x1b[32m--- Reconnected ---\x1b[0m\r\n');
        ws.send(JSON.stringify({ type: 'resize', cols: session.term.cols, rows: session.term.rows }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'output') {
            if (session.mouseTracker) session.mouseTracker.feed(msg.data);
            session.term.write(forceTextPresentation(msg.data));
          } else if (msg.type === 'closed') {
            session.term.write('\r\n\x1b[31m--- Session closed ---\x1b[0m\r\n');
            removeSession(sessionId);
          }
        } catch {}
      };

      ws.onclose = () => {
        setTimeout(() => reconnectWs(sessionId), 3000);
      };

      wrapOnData(session.term, ws);

      session.ws = ws;
    }

    function activateSession(sessionId) {
      activeSessionId = sessionId;
      for (const [id, s] of termSessions) {
        s.el.classList.toggle('active', id === sessionId);
      }
      emptyState.style.display = termSessions.size > 0 ? 'none' : 'flex';
      const session = termSessions.get(sessionId);
      if (session) {
        // ResizeObserver on the wrapper will call fit() when it gains dimensions.
        // Focus the terminal after layout settles.
        requestAnimationFrame(() => session.term.focus());
      }
      renderTabs();
      saveActiveTab();
    }

    function removeSession(sessionId) {
      const session = termSessions.get(sessionId);
      if (!session) return;
      try { session.ws.close(); } catch {}
      session.wrapperRo.disconnect();
      session.term.dispose();
      session.el.remove();
      termSessions.delete(sessionId);

      if (activeSessionId === sessionId) {
        const remaining = [...termSessions.keys()];
        if (remaining.length > 0) {
          activateSession(remaining[remaining.length - 1]);
        } else {
          activeSessionId = null;
          emptyState.style.display = 'flex';
        }
      }
      renderTabs();
    }

    async function closeSession(sessionId) {
      try {
        await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
      } catch {}
      removeSession(sessionId);
    }

    // --- Tabs ---
    function renderTabs() {
      tabBar.innerHTML = '';
      for (const [id, s] of termSessions) {
        const tab = document.createElement('div');
        tab.className = `tab${id === activeSessionId ? ' active' : ''}`;
        const label = `${s.config.username || ''}@${s.config.host || ''}`;
        tab.innerHTML = `
          <span class="tab-label">${label}</span>
          <span class="close-btn" title="Close">&times;</span>
        `;
        tab.querySelector('.tab-label').addEventListener('click', () => activateSession(id));
        tab.querySelector('.close-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          closeSession(id);
        });
        tabBar.appendChild(tab);
      }
    }

    // --- Resize (including mobile keyboard) ---
    function fitActiveTerminal() {
      if (!activeSessionId) return;
      const session = termSessions.get(activeSessionId);
      if (session) session.fitAddon.fit();
    }

    // ResizeObserver on terminal container: fires as a callback when the
    // container's actual dimensions change (keyboard open/close, orientation
    // change, window resize). No setTimeout — the observer itself is the
    // callback that fires after CSS layout recalculates.
    {
      const ro = new ResizeObserver(() => fitActiveTerminal());
      ro.observe(document.getElementById('terminal-container'));
    }

    window.addEventListener('resize', fitActiveTerminal);

    // Use visualViewport to adjust body height for mobile keyboard.
    // The height change propagates through flex layout to terminal-container,
    // which triggers the ResizeObserver above — no manual fit calls needed.
    if (window.visualViewport) {
      const applyViewportHeight = () => {
        document.body.style.height = `${window.visualViewport.height}px`;
      };
      window.visualViewport.addEventListener('resize', applyViewportHeight);
      window.visualViewport.addEventListener('scroll', () => {
        window.scrollTo(0, 0);
      });
      applyViewportHeight();
    }

    // --- Mobile toolbar ---
    // Only send via WebSocket — the server echoes back and xterm.js renders it.
    // Do NOT use term.input() here as it triggers onData → double send.
    function parseEscSeq(str) {
      return str.replace(/\\x([0-9a-fA-F]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
    }

    // Ctrl toggle state
    let ctrlActive = false;
    let ctrlBtnEl = null; // set by renderToolbar

    function setCtrl(active) {
      ctrlActive = active;
      if (ctrlBtnEl) ctrlBtnEl.classList.toggle('mod-active', active);
    }

    // --- Builtin keys definition ---
    const BUILTIN_KEYS = {
      'escape':      { label: 'ESC',  handler: () => '\x1b' },
      'tab':         { label: 'TAB',  handler: () => '\t' },
      'ctrl':        { label: 'Ctrl', modifier: true },
      'arrow-up':    { label: '↑',   handler: () => parseEscSeq('\\x1b[A') },
      'arrow-down':  { label: '↓',   handler: () => parseEscSeq('\\x1b[B') },
      'arrow-left':  { label: '←',   handler: () => parseEscSeq('\\x1b[D') },
      'arrow-right': { label: '→',   handler: () => parseEscSeq('\\x1b[C') },
    };

    // Grid layout: array of { id, row, col }
    const DEFAULT_GRID = [
      { id: 'escape',      row: 0, col: 0 },
      { id: 'tab',         row: 0, col: 1 },
      { id: 'ctrl',        row: 0, col: 2 },
      { id: 'arrow-up',    row: 0, col: 3 },
      { id: 'arrow-left',  row: 1, col: 2 },
      { id: 'arrow-down',  row: 1, col: 3 },
      { id: 'arrow-right', row: 1, col: 4 },
    ];
    const TOOLBAR_LAYOUT_KEY = 'ssh-toolbar-layout';

    function loadToolbarLayout() {
      try {
        const stored = JSON.parse(localStorage.getItem(TOOLBAR_LAYOUT_KEY));
        if (Array.isArray(stored) && stored.length > 0 && stored[0].id) return stored;
      } catch {}
      return DEFAULT_GRID.map(e => ({ ...e }));
    }

    function saveToolbarLayout(layout) {
      localStorage.setItem(TOOLBAR_LAYOUT_KEY, JSON.stringify(layout));
    }

    function getFullGrid() {
      const grid = loadToolbarLayout();
      const placedIds = new Set(grid.map(e => e.id));
      const customKeys = loadCustomKeys();
      const customIds = new Set(customKeys.map(k => k.id));
      const validIds = new Set([...Object.keys(BUILTIN_KEYS), ...customIds]);

      // Ensure all builtin keys are placed
      for (const id of Object.keys(BUILTIN_KEYS)) {
        if (!placedIds.has(id)) {
          grid.push({ id, row: 0, col: getMaxCol(grid) + 1 });
        }
      }
      // Ensure all custom keys are placed
      for (const ck of customKeys) {
        if (!placedIds.has(ck.id)) {
          grid.push({ id: ck.id, ...findEmptyCell(grid) });
        }
      }
      // Remove entries for keys that no longer exist
      return grid.filter(e => validIds.has(e.id));
    }

    function getMaxCol(grid) {
      return grid.reduce((max, e) => Math.max(max, e.col), -1);
    }

    function findEmptyCell(grid) {
      const occupied = new Set(grid.map(e => `${e.row},${e.col}`));
      const maxCol = getMaxCol(grid);
      // Try to find empty cell in existing columns first
      for (let c = 0; c <= maxCol; c++) {
        for (let r = 0; r < 2; r++) {
          if (!occupied.has(`${r},${c}`)) return { row: r, col: c };
        }
      }
      // Append new column
      return { row: 0, col: maxCol + 1 };
    }

    function createKeyButton(id, builtin, ck) {
      const btn = document.createElement('button');
      btn.className = 'key-btn';
      btn.textContent = builtin ? builtin.label : ck.label;

      if (builtin && builtin.modifier) {
        ctrlBtnEl = btn;
        if (ctrlActive) btn.classList.add('mod-active');
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          setCtrl(!ctrlActive);
          if (activeSessionId) {
            const session = termSessions.get(activeSessionId);
            if (session) session.term.focus({ preventScroll: true });
          }
        });
      } else {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          if (!activeSessionId) return;
          const session = termSessions.get(activeSessionId);
          if (!session || session.ws.readyState !== 1) return;
          let data;
          if (builtin) {
            data = builtin.handler();
          } else if (ck.type === 'special') {
            data = parseEscSeq(ck.value);
          } else {
            data = ck.value.replace(/\\n/g, '\n');
          }
          if (data) session.ws.send(JSON.stringify({ type: 'input', data }));
          if (ctrlActive) setCtrl(false);
          session.term.focus({ preventScroll: true });
        });
      }
      return btn;
    }

    function renderToolbar() {
      const container = document.getElementById('toolbar-keys');
      container.innerHTML = '';
      ctrlBtnEl = null;

      const grid = getFullGrid();
      const customKeys = loadCustomKeys();
      const customMap = new Map(customKeys.map(k => [k.id, k]));

      for (const entry of grid) {
        const builtin = BUILTIN_KEYS[entry.id];
        const ck = customMap.get(entry.id);
        if (!builtin && !ck) continue;

        const btn = createKeyButton(entry.id, builtin, ck);
        // CSS Grid placement (1-indexed)
        btn.style.gridRow = entry.row + 1;
        btn.style.gridColumn = entry.col + 1;
        container.appendChild(btn);
      }
    }

    // Intercept keyboard input when Ctrl toggle is active.
    // xterm.js onData fires for normal key presses — we intercept and
    // convert to Ctrl+key (byte = key charCode - 64 for A-Z, or special cases).

    // Force text presentation for characters that iOS renders as color emoji.
    // Covers: misc symbols, dingbats, transport/map, enclosed alphanumerics,
    // geometric shapes, arrows, supplemental arrows, misc technical, etc.
    const EMOJI_FORCE_TEXT_RE = /[\u203C\u2049\u2122\u2139\u2194-\u2199\u21A9\u21AA\u231A\u231B\u2328\u23CF\u23E9-\u23FA\u24C2\u25AA\u25AB\u25B6\u25C0\u25FB-\u25FE\u2600-\u27BF\u2934\u2935\u2B05-\u2B07\u2B1B\u2B1C\u2B50\u2B55\u3030\u303D\u3297\u3299](?!\uFE0E)/g;
    function forceTextPresentation(str) {
      return str.replace(EMOJI_FORCE_TEXT_RE, '$&\uFE0E');
    }

    // Filter out terminal auto-responses that xterm.js generates.
    // If echoed back by the shell they appear as garbage text.
    // Matches: DA1/DA2 (\x1b[?...c, \x1b[>...c), DSR (\x1b[...n),
    //          OSC color responses (\x1b]10;...\x1b\\ or \x1b]11;...\x07 etc.)
    const TERM_RESPONSE_RE = /\x1b\[\??[>]?[\d;]*[cn]|\x1b\][\d;]*[^\x07\x1b]*(?:\x07|\x1b\\)/g;

    function wrapOnData(term, ws) {
      term.onData((data) => {
        if (ws.readyState !== 1) return;
        let toSend = data;

        // Strip terminal auto-responses
        if (toSend.includes('\x1b')) {
          toSend = toSend.replace(TERM_RESPONSE_RE, '');
          if (toSend.length === 0) return;
        }

        if (ctrlActive) {
          const ch = data.length === 1 ? data.toLowerCase() : null;
          if (ch && ch >= 'a' && ch <= 'z') {
            toSend = String.fromCharCode(ch.charCodeAt(0) - 96);
          }
          setCtrl(false);
        }
        ws.send(JSON.stringify({ type: 'input', data: toSend }));
      });
    }


    // --- Mouse mode tracker ---
    // Watches terminal output for DEC private mode set/reset sequences
    // to determine if the remote application has mouse tracking enabled.
    // ?1000 = X10 mouse, ?1002 = button-event, ?1003 = any-event
    // ?1006 = SGR extended mouse encoding
    function createMouseModeTracker() {
      let mouseMode = false;  // any mouse tracking active
      let sgrMode = false;    // SGR encoding active
      return {
        get active() { return mouseMode; },
        get sgr() { return sgrMode; },
        // Call with each chunk of output data from the server
        feed(data) {
          // Match \x1b[?{modes}h (set) and \x1b[?{modes}l (reset)
          const re = /\x1b\[\?([\d;]+)([hl])/g;
          let m;
          while ((m = re.exec(data)) !== null) {
            const modes = m[1].split(';');
            const enable = m[2] === 'h';
            for (const mode of modes) {
              if (mode === '1000' || mode === '1002' || mode === '1003') {
                mouseMode = enable;
              }
              if (mode === '1006') {
                sgrMode = enable;
              }
            }
          }
        },
      };
    }

    // --- Touch layer: direct touch control with inertia ---
    function setupTouchLayer(wrapper, term, getWs, mouseTracker) {
      const layer = document.createElement('div');
      layer.className = 'touch-layer';
      wrapper.appendChild(layer);

      let touchStartY = null;
      let pixelAccum = 0;
      let moved = false;
      let inertiaId = null;

      // Velocity: track last few moves with timestamps
      let lastY = 0;
      let lastT = 0;
      let velocity = 0;

      // Deceleration modeled after iOS UIScrollView:
      // v(t) = v0 * rate^(t/16ms), rate ≈ 0.992 per ms → ~0.88 per frame
      const DECEL = 0.88;
      const STOP_THRESHOLD = 0.3; // px/frame

      function lineHeight() {
        const el = wrapper.querySelector('.xterm-screen');
        if (el && term.rows > 0) return el.offsetHeight / term.rows;
        return 18;
      }

      function scrollByPixels(px) {
        pixelAccum += px;
        const lh = lineHeight();
        const lines = Math.trunc(pixelAccum / lh);
        if (lines === 0) return;
        pixelAccum -= lines * lh;

        if (mouseTracker.active) {
          const ws = getWs();
          if (!ws || ws.readyState !== 1) return;
          const col = Math.floor(term.cols / 2);
          const row = Math.floor(term.rows / 2);
          const btn = (lines > 0) ? 65 : 64;
          const abs = Math.abs(lines);
          for (let i = 0; i < abs; i++) {
            if (mouseTracker.sgr) {
              ws.send(JSON.stringify({ type: 'input', data: `\x1b[<${btn};${col};${row}M` }));
            } else {
              const lb = btn + 32;
              ws.send(JSON.stringify({ type: 'input', data: `\x1b[M${String.fromCharCode(lb)}${String.fromCharCode(col + 33)}${String.fromCharCode(row + 33)}` }));
            }
          }
        } else {
          term.scrollLines(lines);
        }
      }

      function stopInertia() {
        if (inertiaId !== null) {
          cancelAnimationFrame(inertiaId);
          inertiaId = null;
        }
      }

      function runInertia() {
        stopInertia();
        function tick() {
          velocity *= DECEL;
          if (Math.abs(velocity) < STOP_THRESHOLD) { inertiaId = null; return; }
          scrollByPixels(velocity);
          inertiaId = requestAnimationFrame(tick);
        }
        inertiaId = requestAnimationFrame(tick);
      }

      layer.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        stopInertia();
        touchStartY = e.touches[0].clientY;
        lastY = touchStartY;
        lastT = performance.now();
        velocity = 0;
        pixelAccum = 0;
        moved = false;
      });

      layer.addEventListener('touchmove', (e) => {
        if (touchStartY === null || e.touches.length !== 1) return;
        e.preventDefault();

        const now = performance.now();
        const currentY = e.touches[0].clientY;
        const delta = lastY - currentY; // positive = finger up = scroll down

        if (Math.abs(currentY - touchStartY) > 5) moved = true;

        // Exponential smoothing for velocity (px/frame)
        const dt = now - lastT;
        if (dt > 0) {
          const instantV = (delta / dt) * 16; // normalize to ~16ms frame
          velocity = 0.6 * instantV + 0.4 * velocity;
        }
        lastY = currentY;
        lastT = now;

        scrollByPixels(delta);
      }, { passive: false });

      layer.addEventListener('touchend', (e) => {
        if (!moved) {
          e.preventDefault();
          term.focus();
        } else if (Math.abs(velocity) > STOP_THRESHOLD) {
          runInertia();
        }
        touchStartY = null;
        moved = false;
      });

      layer.addEventListener('touchcancel', () => {
        stopInertia();
        touchStartY = null;
        pixelAccum = 0;
        moved = false;
        velocity = 0;
      });

      return layer;
    }

    // --- Custom Keys ---
    const CUSTOM_KEYS_KEY = 'ssh-custom-keys';

    function generateId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
    }

    function loadCustomKeys() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOM_KEYS_KEY)) || [];
      } catch { return []; }
    }

    function saveCustomKeys(keys) {
      localStorage.setItem(CUSTOM_KEYS_KEY, JSON.stringify(keys));
    }

    // --- Grid Editor state ---
    let geSelectedId = null;

    function renderGridEditor() {
      const editor = document.getElementById('grid-editor');
      const hint = document.getElementById('grid-editor-hint');
      const btnDeselect = document.getElementById('ge-deselect');
      const btnDelete = document.getElementById('ge-delete');
      editor.innerHTML = '';

      const grid = getFullGrid();
      const customKeys = loadCustomKeys();
      const customMap = new Map(customKeys.map(k => [k.id, k]));
      const maxCol = Math.max(getMaxCol(grid) + 1, 4); // at least 1 extra column
      const occupied = new Map();
      for (const e of grid) occupied.set(`${e.row},${e.col}`, e.id);

      for (let c = 0; c <= maxCol; c++) {
        for (let r = 0; r < 2; r++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';
          cell.style.gridRow = r + 1;
          cell.style.gridColumn = c + 1;

          const key = `${r},${c}`;
          const id = occupied.get(key);

          if (id) {
            const builtin = BUILTIN_KEYS[id];
            const ck = customMap.get(id);
            cell.classList.add('occupied');
            cell.textContent = builtin ? builtin.label : (ck ? ck.label : '?');
            if (id === geSelectedId) cell.classList.add('selected');

            cell.addEventListener('click', () => {
              if (geSelectedId === id) {
                geSelectedId = null;
              } else if (geSelectedId) {
                // Swap: move selected to this cell, this key to selected's old position
                const g = getFullGrid();
                const fromEntry = g.find(e => e.id === geSelectedId);
                const toEntry = g.find(e => e.id === id);
                if (fromEntry && toEntry) {
                  const tmpR = fromEntry.row, tmpC = fromEntry.col;
                  fromEntry.row = toEntry.row;
                  fromEntry.col = toEntry.col;
                  toEntry.row = tmpR;
                  toEntry.col = tmpC;
                  saveToolbarLayout(g);
                  renderToolbar();
                }
                geSelectedId = null;
              } else {
                geSelectedId = id;
              }
              renderGridEditor();
            });
          } else {
            // Empty cell
            if (geSelectedId) cell.classList.add('drop-target');
            cell.addEventListener('click', () => {
              if (!geSelectedId) return;
              const g = getFullGrid();
              const entry = g.find(e => e.id === geSelectedId);
              if (entry) {
                entry.row = r;
                entry.col = c;
                saveToolbarLayout(g);
                renderToolbar();
              }
              geSelectedId = null;
              renderGridEditor();
            });
          }
          editor.appendChild(cell);
        }
      }

      // Update action buttons
      const selectedIsCustom = geSelectedId && !BUILTIN_KEYS[geSelectedId];
      btnDeselect.disabled = !geSelectedId;
      btnDelete.disabled = !selectedIsCustom;

      if (geSelectedId) {
        const builtin = BUILTIN_KEYS[geSelectedId];
        const ck = customMap.get(geSelectedId);
        const name = builtin ? builtin.label : (ck ? ck.label : '');
        hint.textContent = `Selected: ${name}. Tap an empty cell to move, or tap another key to swap.`;
      } else {
        hint.textContent = 'Tap a key, then tap an empty cell to move it.';
      }
    }

    // Type toggle
    document.getElementById('ck-type').addEventListener('change', (e) => {
      const isSpecial = e.target.value === 'special';
      document.getElementById('ck-text-group').style.display = isSpecial ? 'none' : '';
      document.getElementById('ck-special-group').style.display = isSpecial ? '' : 'none';
    });

    // Grid editor action buttons
    document.getElementById('ge-deselect').addEventListener('click', () => {
      geSelectedId = null;
      renderGridEditor();
    });

    document.getElementById('ge-delete').addEventListener('click', () => {
      if (!geSelectedId || BUILTIN_KEYS[geSelectedId]) return;
      const updated = loadCustomKeys().filter(k => k.id !== geSelectedId);
      saveCustomKeys(updated);
      const g = loadToolbarLayout().filter(e => e.id !== geSelectedId);
      saveToolbarLayout(g);
      geSelectedId = null;
      renderGridEditor();
      renderToolbar();
    });

    // Open/close custom keys dialog
    const customkeysOverlay = document.getElementById('customkeys-overlay');

    document.getElementById('btn-custom-keys').addEventListener('click', (e) => {
      e.preventDefault();
      geSelectedId = null;
      renderGridEditor();
      // Reset form
      document.getElementById('ck-label').value = '';
      document.getElementById('ck-value').value = '';
      document.getElementById('ck-type').value = 'text';
      document.getElementById('ck-text-group').style.display = '';
      document.getElementById('ck-special-group').style.display = 'none';
      customkeysOverlay.classList.add('show');
    });

    document.getElementById('ck-close').addEventListener('click', () => {
      customkeysOverlay.classList.remove('show');
      if (activeSessionId) {
        const session = termSessions.get(activeSessionId);
        if (session) session.term.focus({ preventScroll: true });
      }
    });

    customkeysOverlay.addEventListener('click', (e) => {
      if (e.target === customkeysOverlay) {
        customkeysOverlay.classList.remove('show');
      }
    });

    // Add custom key
    document.getElementById('ck-add').addEventListener('click', () => {
      const label = document.getElementById('ck-label').value.trim();
      if (!label) return;

      const type = document.getElementById('ck-type').value;
      let value;
      if (type === 'special') {
        value = document.getElementById('ck-special').value;
      } else {
        value = document.getElementById('ck-value').value;
        if (!value) return;
      }

      const newId = generateId();
      const keys = loadCustomKeys();
      keys.push({ id: newId, label, type, value });
      saveCustomKeys(keys);

      // Add to grid at first empty cell
      const grid = loadToolbarLayout();
      const pos = findEmptyCell(grid);
      grid.push({ id: newId, row: pos.row, col: pos.col });
      saveToolbarLayout(grid);

      renderGridEditor();
      renderToolbar();

      // Reset inputs
      document.getElementById('ck-label').value = '';
      document.getElementById('ck-value').value = '';
    });

    // Initial render
    renderToolbar();

    // --- Keyboard shortcut ---
    document.addEventListener('keydown', (e) => {
      // Ctrl+Shift+N: new connection
      if (e.ctrlKey && e.shiftKey && e.key === 'N') {
        e.preventDefault();
        showConnectDialog();
      }
    });

    init();
  </script>
</body>
</html>
