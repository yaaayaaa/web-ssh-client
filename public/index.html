<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>Web SSH Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      overflow: clip;
      height: 100%;
      overscroll-behavior: none;
    }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #111113;
      color: #e5e5e7;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: clip;
      overscroll-behavior: none;
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      touch-action: none;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Header --- */
    #header {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      background: #1c1c1e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 8px;
      flex-shrink: 0;
      order: -1;
    }
    @media (max-width: 768px) {
      #header {
        order: 0;
        padding: 6px 10px;
        border-bottom: none;
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      #header.hidden { display: none; }
    }
    @media (min-width: 769px) {
      body {
        flex-direction: row;
      }
      #sidebar {
        display: flex;
      }
      #sidebar.hidden {
        display: none;
      }
      #sidebar.hidden ~ #terminal-container #sidebar-open-btn {
        display: block;
      }
      #header {
        display: none;
      }
    }
    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: hidden;
      flex: 1;
      scrollbar-width: none;
      touch-action: pan-x;
    }
    .tab-bar.scrollable {
      overflow-x: auto;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-bar:not(.scrollable) .tab {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }
    .tab-bar:not(.scrollable) .tab .tab-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: #98989d;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab:hover {
      background: rgba(255,255,255,0.06);
    }
    .tab.active {
      background: rgba(255,255,255,0.1);
      color: #e5e5e7;
    }
    .tab .tab-number {
      font-size: 10px;
      min-width: 15px;
      height: 15px;
      line-height: 15px;
      text-align: center;
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
      color: #78787c;
      flex-shrink: 0;
    }
    .tab.active .tab-number {
      background: rgba(255,255,255,0.12);
      color: #a0a0a5;
    }
    .tab .close-btn {
      font-size: 14px;
      line-height: 1;
      opacity: 0.6;
      cursor: pointer;
    }
    .tab .close-btn:hover { opacity: 1; }
    .font-size-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .font-size-controls button {
      padding: 6px 12px;
      background: #2c2c2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e5e5e7;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      line-height: 1;
      transition: all 0.15s;
    }
    .font-size-controls button:hover { background: #3a3a3c; }
    .font-size-controls button:active { transform: scale(0.98); }
    .font-size-controls .font-size-label {
      font-size: 14px;
      color: #e5e5e7;
      min-width: 28px;
      text-align: center;
      user-select: none;
    }
    #btn-new {
      padding: 5px 12px;
      background: #34c759;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #btn-new:hover { background: #30d158; transform: scale(1.02); }
    #btn-new:active { transform: scale(0.98); }

    /* --- Connect Dialog --- */
    #connect-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #connect-overlay.show { display: flex; }
    #connect-dialog {
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 400px;
      max-height: 80%;
      overflow-y: auto;
      touch-action: pan-y;
      overscroll-behavior: contain;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #connect-dialog h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      color: #98989d;
      margin-bottom: 4px;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      background: #111113;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e5e5e7;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #5e9eff;
      box-shadow: 0 0 0 3px rgba(94,158,255,0.15);
    }
    .form-row {
      display: flex;
      gap: 12px;
    }
    .form-row .form-group { flex: 1; }
    .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #34c759; color: #fff; }
    .btn-primary:hover { background: #30d158; }
    .btn-secondary { background: #2c2c2e; color: #e5e5e7; border: 1px solid rgba(255,255,255,0.08); }
    .btn-secondary:hover { background: #3a3a3c; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg {
      color: #ff6b6b;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    /* --- Terminal Area --- */
    #terminal-container {
      flex: 1;
      position: relative;
      overflow: clip;
    }
    .terminal-wrapper {
      position: absolute;
      inset: 0;
      display: none;
      padding: 4px;
    }
    .terminal-wrapper.active { display: block; }
    .terminal-wrapper .xterm {
      height: 100%;
      font-variant-emoji: text;
    }
    .terminal-wrapper .xterm-helper-textarea {
      caret-color: transparent;
    }
    .terminal-wrapper .xterm-viewport {
      scrollbar-width: none;
    }
    .terminal-wrapper .xterm-viewport::-webkit-scrollbar {
      display: none;
    }
    .touch-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      touch-action: none;
      pointer-events: none;
    }
    @media (pointer: coarse) {
      .touch-layer { pointer-events: auto; }
    }

    /* --- Floating Window --- */
    .floating-window {
      position: absolute;
      width: 480px;
      height: 320px;
      min-width: 240px;
      min-height: 160px;
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 25;
    }
    .floating-window.visible { display: flex; }
    .floating-window-titlebar {
      display: flex;
      align-items: center;
      padding: 0 8px;
      height: 32px;
      background: #2c2c2e;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
      gap: 6px;
    }
    .floating-window-titlebar:active { cursor: grabbing; }
    .floating-window-title {
      flex: 1;
      font-size: 12px;
      color: #98989d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .floating-window-btn {
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #98989d;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    .floating-window-btn:hover { background: rgba(255,255,255,0.1); color: #e5e5e7; }
    .floating-window-btn.close-btn:hover { background: #ff453a; color: #fff; }
    .floating-window-body {
      flex: 1;
      overflow: hidden;
      font-size: 13px;
      color: #636366;
      position: relative;
    }
    .floating-terminal-wrapper { width: 100%; height: 100%; padding: 2px; }
    .floating-terminal-wrapper .xterm { height: 100%; font-variant-emoji: text; }
    .floating-terminal-wrapper .xterm-viewport { scrollbar-width: none; }
    .floating-terminal-wrapper .xterm-viewport::-webkit-scrollbar { display: none; }
    .floating-terminal-wrapper .xterm-helper-textarea { caret-color: transparent; }
    .floating-window-resize {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 28px;
      height: 28px;
      cursor: nwse-resize;
      touch-action: none;
      z-index: 15;
    }
    .floating-window-resize::after {
      content: '';
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(255,255,255,0.18);
      border-bottom: 2px solid rgba(255,255,255,0.18);
    }
    .floating-minimized-dock {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 20;
      pointer-events: none;
    }
    .floating-minimized-dock:empty { display: none; }
    .floating-dock-pill {
      padding: 4px 12px;
      background: #2c2c2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      color: #98989d;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      pointer-events: auto;
      transition: background 0.15s;
    }
    .floating-dock-pill:hover { background: #3a3a3c; color: #e5e5e7; }
    #btn-add-window {
      padding: 5px 12px;
      background: #5e9eff;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
      display: none;
    }
    #btn-add-window:hover { background: #4a8af0; transform: scale(1.02); }
    #btn-add-window:active { transform: scale(0.98); }

    /* --- Sidebar (Desktop Vertical Tabs) --- */
    #sidebar {
      display: none;
      flex-direction: column;
      width: 200px;
      flex-shrink: 0;
      background: #1c1c1e;
      border-right: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }
    #sidebar-header {
      display: flex;
      justify-content: flex-end;
      padding: 8px;
      flex-shrink: 0;
    }
    #sidebar-toggle {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #98989d;
      font-size: 14px;
      cursor: pointer;
      padding: 2px 8px;
      line-height: 1;
      transition: all 0.15s;
    }
    #sidebar-toggle:hover { color: #e5e5e7; background: rgba(255,255,255,0.06); }
    #sidebar-tabs {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    #sidebar-tabs::-webkit-scrollbar { width: 4px; }
    #sidebar-tabs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    #sidebar-tabs .tab {
      width: 100%;
      border-radius: 8px;
    }
    #sidebar-tabs .tab .tab-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #sidebar-actions {
      padding: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }
    #sidebar-actions button {
      width: 100%;
      padding: 6px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      font-family: inherit;
    }
    #sidebar-btn-new {
      background: #34c759;
      color: #fff;
    }
    #sidebar-btn-new:hover { background: #30d158; }
    #sidebar-btn-add-window {
      background: #5e9eff;
      color: #fff;
      display: none;
    }
    #sidebar-btn-add-window:hover { background: #4a8af0; }
    #sidebar-open-btn {
      display: none;
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 10;
      background: rgba(28,28,30,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #98989d;
      font-size: 16px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      transition: all 0.15s;
    }
    #sidebar-open-btn:hover { color: #e5e5e7; background: rgba(28,28,30,1); }

    /* --- Empty State --- */
    #empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #636366;
      font-size: 15px;
      flex-direction: column;
      gap: 16px;
    }
    #empty-state button {
      padding: 10px 24px;
      background: #34c759;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    #empty-state button:hover { background: #30d158; transform: scale(1.02); }
    #empty-state button:active { transform: scale(0.98); }

    /* --- Mobile toolbar --- */
    #mobile-toolbar {
      display: none;
      flex-shrink: 0;
      padding: 2px 6px;
      background: #1c1c1e;
      border-top: 1px solid rgba(255,255,255,0.08);
      gap: 2px;
      flex-wrap: nowrap;
      align-items: center;
    }
    @media (max-width: 768px) {
      #mobile-toolbar { display: flex; }
    }
    #toolbar-keys {
      display: grid;
      grid-template-rows: repeat(2, var(--btn-size, 32px));
      grid-auto-columns: var(--btn-w, 44px);
      gap: 2px;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
      touch-action: pan-x;
    }
    #toolbar-keys::-webkit-scrollbar { display: none; }
    .key-btn {
      min-width: var(--btn-w, 44px);
      height: var(--btn-size, 32px);
      padding: 2px 4px;
      background: #2c2c2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #e5e5e7;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      transition: background 0.1s;
    }
    .key-btn:active { background: #3a3a3c; }
    .key-btn.mod-active {
      background: #5e9eff;
      border-color: #5e9eff;
      color: #fff;
    }
    .settings-btn {
      width: var(--btn-size, 32px);
      height: var(--btn-size, 32px);
      padding: 2px 0;
      background: #2c2c2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #98989d;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }
    .settings-btn:active { background: #3a3a3c; }

    /* --- Custom Keys Settings Dialog --- */
    #customkeys-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #customkeys-overlay.show { display: flex; }
    #customkeys-dialog {
      background: #1c1c1e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      width: 90%;
      max-width: 420px;
      max-height: 80%;
      overflow-y: auto;
      touch-action: pan-y;
      overscroll-behavior: contain;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #customkeys-dialog h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .ck-add-form { display: flex; flex-direction: column; gap: 10px; }
    .ck-add-form .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: #111113;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #e5e5e7;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .ck-add-form .form-group select:focus {
      outline: none;
      border-color: #5e9eff;
      box-shadow: 0 0 0 3px rgba(94,158,255,0.15);
    }
    .ck-hint {
      font-size: 11px;
      color: #636366;
      margin-top: 2px;
    }
    .ck-section-label {
      font-size: 11px;
      font-weight: 600;
      color: #98989d;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .grid-editor-wrap {
      overflow-x: auto;
      margin-bottom: 12px;
      scrollbar-width: none;
    }
    .grid-editor-wrap::-webkit-scrollbar { display: none; }
    .grid-editor {
      display: grid;
      grid-template-rows: repeat(2, 42px);
      grid-auto-columns: 54px;
      gap: 4px;
      width: max-content;
    }
    .grid-cell {
      width: 54px;
      height: 42px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: #636366;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.1s;
    }
    .grid-cell:hover { border-color: rgba(255,255,255,0.15); }
    .grid-cell.occupied {
      background: #2c2c2e;
      border: 1px solid rgba(255,255,255,0.08);
      color: #e5e5e7;
      font-size: 12px;
    }
    .grid-cell.selected {
      border-color: #5e9eff;
      box-shadow: 0 0 0 1px #5e9eff;
    }
    .grid-cell.drop-target {
      border-color: #34c759;
      background: rgba(52, 199, 89, 0.1);
    }
    .grid-editor-hint {
      font-size: 11px;
      color: #636366;
      margin-bottom: 12px;
    }
    .grid-editor-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .grid-editor-actions button {
      padding: 4px 10px;
      background: #2c2c2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #98989d;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .grid-editor-actions button:hover { color: #e5e5e7; border-color: rgba(255,255,255,0.15); }
    .grid-editor-actions button.danger:hover { color: #ff6b6b; border-color: #ff6b6b; }
    .grid-editor-actions button:disabled { opacity: 0.3; cursor: default; }

    /* --- Saved Connections List --- */
    .saved-list {
      margin-bottom: 16px;
      max-height: 180px;
      overflow-y: auto;
      touch-action: pan-y;
    }
    .saved-list-header {
      font-size: 11px;
      font-weight: 600;
      color: #98989d;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .saved-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      margin-bottom: 4px;

      font-size: 12px;

    }

  </style>
</head>
<body>

  <div id="paste-anchor">
    <input id="paste-anchor-input" type="text" autocomplete="off">
